permalink: /feature/

<div id="feature-app">
  <div id="feature-loading" style="text-align:center; padding:40px; color:#888;">載入中...</div>
  <div id="feature-content" style="display:none;"></div>
  <div id="feature-not-found" style="display:none; text-align:center; padding:40px;">
    <h2>找不到這篇文章</h2>
    <p style="color:#888;">請確認網址是否正確。</p>
    <a href="/" style="color:#2a7ae2;">← 回首頁</a>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
(function() {
  var SB_URL = 'https://kszbdgfbihnawjgmwjlk.supabase.co';
  var SB_KEY = 'sb_publishable_VrgzauRQ_kV_2MD0ujZ39w_0KREni_f';

  // Parse URL: /feature/2026-03/ai-transforming-social-media
  var path = window.location.pathname.replace(/\/$/, '').replace('/feature/', '');
  if (!path) { window.location.href = '/'; return; }

  // Fetch by slug
  var query = 'type=eq.feature&slug=eq.' + encodeURIComponent(path) + '&select=*';

  fetch(SB_URL + '/rest/v1/posts?' + query, {
    headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY }
  })
  .then(function(res) { return res.json(); })
  .then(function(data) {
    document.getElementById('feature-loading').style.display = 'none';

    if (data.length === 0) {
      document.getElementById('feature-not-found').style.display = 'block';
      return;
    }

    var post = data[0];
    document.title = post.title + ' — Daily AI Taiwan';

    // Check login for paywall
    var isLoggedIn = false;
    try {
      var stored = localStorage.getItem('sb-kszbdgfbihnawjgmwjlk-auth-token');
      if (stored) { var sess = JSON.parse(stored); if (sess && sess.user) isLoggedIn = true; }
    } catch(e) {}

    var fullContent = marked.parse(post.content);

    var html = '<div style="margin-bottom:16px;">' +
      '<a href="/" style="color:#2a7ae2;text-decoration:none;font-size:0.9em;">← 回首頁</a>' +
      ' <span style="color:#ddd;margin:0 8px;">|</span> ' +
      '<span style="display:inline-block;background:#ef4444;color:#fff;font-size:0.7em;padding:2px 10px;border-radius:12px;font-weight:600;vertical-align:middle;">專題</span>' +
      '</div>';

    if (!isLoggedIn) {
      // Preview
      var tmp = document.createElement('div');
      tmp.innerHTML = fullContent;
      var els = tmp.querySelectorAll('h1,h2,h3,p,ul,ol,table,blockquote,hr');
      var show = Math.max(5, Math.floor(els.length * 0.25));
      var preview = '';
      for (var i = 0; i < Math.min(show, els.length); i++) preview += els[i].outerHTML;
      html += preview;
      html += '<div class="paywall-overlay"></div>';
      html += '<div class="paywall-box">';
      html += '<h3>🔒 註冊免費閱讀完整專題</h3>';
      html += '<p>精選專題需要登入才能閱讀完整內容。<br>免費註冊即可解鎖！</p>';
      html += '<a href="/login" class="paywall-btn">免費註冊 / 登入</a>';
      html += '<p style="font-size:0.8em;color:#999;margin-top:12px;">支援 Email、Google、GitHub、Discord 登入</p>';
      html += '</div>';
    } else {
      html += fullContent;

      // Share buttons
      var shareUrl = encodeURIComponent(window.location.href);
      var shareTitle = encodeURIComponent(post.title);
      html += '<div style="margin-top:2em;padding-top:1em;border-top:1px solid #eee;">' +
        '<span style="color:#888;font-size:0.9em;">分享：</span> ' +
        '<a href="https://twitter.com/intent/tweet?url=' + shareUrl + '&text=' + shareTitle + '" target="_blank" style="color:#1da1f2;margin:0 8px;text-decoration:none;">𝕏</a>' +
        '<a href="https://www.facebook.com/sharer/sharer.php?u=' + shareUrl + '" target="_blank" style="color:#1877f2;margin:0 8px;text-decoration:none;">Facebook</a>' +
        '<a href="https://www.linkedin.com/sharing/share-offsite/?url=' + shareUrl + '" target="_blank" style="color:#0a66c2;margin:0 8px;text-decoration:none;">LinkedIn</a>' +
        '<button onclick="navigator.clipboard.writeText(window.location.href).then(function(){alert(\'已複製連結！\')})" style="border:1px solid #ddd;background:#fff;padding:3px 10px;border-radius:4px;cursor:pointer;font-size:0.85em;margin-left:8px;">複製連結</button>' +
        '</div>';
    }

    var el = document.getElementById('feature-content');
    el.innerHTML = html;
    el.style.display = 'block';

    // Table labels
    el.querySelectorAll('table').forEach(function(table) {
      var headers = [];
      table.querySelectorAll('thead th').forEach(function(th) { headers.push(th.textContent.trim()); });
      if (headers.length === 0) return;
      table.querySelectorAll('tbody tr').forEach(function(tr) {
        tr.querySelectorAll('td').forEach(function(td, i) {
          if (headers[i]) td.setAttribute('data-label', headers[i]);
        });
      });
    });

    // Track view
    fetch(SB_URL + '/rest/v1/post_views', {
      method: 'POST',
      headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
      body: JSON.stringify({ post_date: post.date, post_type: 'feature' })
    }).catch(function(){});
  })
  .catch(function() {
    document.getElementById('feature-loading').style.display = 'none';
    document.getElementById('feature-not-found').style.display = 'block';
  });
})();
</script>

</style>
