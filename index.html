<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
(function() {
  const SB_URL = 'https://kszbdgfbihnawjgmwjlk.supabase.co';
  const SB_KEY = 'sb_publishable_VrgzauRQ_kV_2MD0ujZ39w_0KREni_f';

  // Store posts in memory for click access
  const postsCache = {};

  async function apiFetch(query) {
    try {
      const res = await fetch(SB_URL + '/rest/v1/posts?' + query, {
        headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY }
      });
      if (!res.ok) throw new Error('API error: ' + res.status);
      return await res.json();
    } catch (e) {
      console.error('Supabase fetch error:', e);
      return [];
    }
  }

  function fmt(d) {
    const dt = new Date(d + 'T00:00:00');
    return dt.getFullYear() + '/' + String(dt.getMonth()+1).padStart(2,'0') + '/' + String(dt.getDate()).padStart(2,'0');
  }
  function fmtMonth(d) {
    const dt = new Date(d + 'T00:00:00');
    return dt.getFullYear() + ' 年 ' + (dt.getMonth()+1) + ' 月';
  }
  function fmtYear(d) {
    return new Date(d + 'T00:00:00').getFullYear() + ' 年';
  }

  function addTableLabels(container) {
    var tables = container.querySelectorAll('table');
    tables.forEach(function(table) {
      var headers = [];
      table.querySelectorAll('thead th').forEach(function(th) {
        headers.push(th.textContent.trim());
      });
      if (headers.length === 0) return;
      table.querySelectorAll('tbody tr').forEach(function(tr) {
        tr.querySelectorAll('td').forEach(function(td, i) {
          if (headers[i]) td.setAttribute('data-label', headers[i]);
        });
      });
    });
  }

  function trackPostView(date, type) {
    var email = null, ip = null;
    try {
      var stored = localStorage.getItem('sb-kszbdgfbihnawjgmwjlk-auth-token');
      if (stored) { var s = JSON.parse(stored); if (s && s.user) email = s.user.email; }
    } catch(e) {}
    fetch(SB_URL + '/rest/v1/post_views', {
      method: 'POST',
      headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
      body: JSON.stringify({ post_date: date, post_type: type, user_email: email })
    }).catch(function(){});
  }

  function showPost(key) {
    const content = postsCache[key];
    if (!content) return;
    var body = document.getElementById('post-modal-body');
    body.innerHTML = marked.parse(content);
    addTableLabels(body);
    document.getElementById('post-modal').style.display = 'flex';
    document.body.style.overflow = 'hidden';
    // Track view
    var parts = key.split('_');
    if (parts.length === 2) trackPostView(parts[0], parts[1]);
  }

  function closeModal() {
    document.getElementById('post-modal').style.display = 'none';
    document.body.style.overflow = '';
  }

  document.getElementById('post-modal-overlay').addEventListener('click', closeModal);
  document.getElementById('modal-close-btn').addEventListener('click', closeModal);
  document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeModal(); });

  // Make showPost globally accessible
  window._showPost = showPost;

  function buildList(posts, formatFn) {
    return '<ul>' + posts.map(function(p) {
      var key = p.date + '_' + p.type;
      postsCache[key] = p.content;
      return '<li><a href="javascript:void(0)" onclick="window._showPost(\'' + key + '\')">' +
        '<strong>' + formatFn(p.date) + '</strong></a> — ' + (p.summary || p.title) + '</li>';
    }).join('') + '</ul>';
  }

  function buildGroupedList(posts) {
    // Group by year-month
    var groups = {};
    posts.forEach(function(p) {
      var ym = p.date.substring(0, 7);
      if (!groups[ym]) groups[ym] = [];
      groups[ym].push(p);
    });

    var keys = Object.keys(groups).sort().reverse();
    var html = '';
    keys.forEach(function(ym, idx) {
      var d = new Date(ym + '-01T00:00:00');
      var label = d.getFullYear() + ' 年 ' + (d.getMonth()+1) + ' 月';
      var count = groups[ym].length;
      var open = idx === 0 ? 'open' : '';
      html += '<details ' + open + ' class="month-group">';
      html += '<summary><strong>' + label + '</strong> <span class="month-count">(' + count + ' 篇)</span></summary>';
      html += '<ul>';
      groups[ym].forEach(function(p) {
        var key = p.date + '_' + p.type;
        postsCache[key] = p.content;
        html += '<li><a href="javascript:void(0)" onclick="window._showPost(\'' + key + '\')">' +
          '<strong>' + fmt(p.date) + '</strong></a> — ' + (p.summary || p.title) + '</li>';
      });
      html += '</ul></details>';
    });
    return html;
  }

  async function loadToday() {
    var today = new Date().toISOString().split('T')[0];
    var data = await apiFetch('type=eq.daily&date=eq.' + today + '&select=*');
    var el = document.getElementById('today-post');

    if (data.length > 0) {
      el.innerHTML = marked.parse(data[0].content);
      addTableLabels(el);
      trackPostView(data[0].date, 'daily');
    } else {
      var latest = await apiFetch('type=eq.daily&select=*&order=date.desc&limit=1');
      if (latest.length > 0) {
        el.innerHTML = '<p style="color:#888;font-style:italic;">今日日報尚未發布，以下為最新日報（' + fmt(latest[0].date) + '）：</p>' + marked.parse(latest[0].content);
        addTableLabels(el);
        trackPostView(latest[0].date, 'daily');
      } else {
        el.innerHTML = '<p>尚無日報</p>';
      }
    }
  }

  async function loadDaily() {
    var posts = await apiFetch('type=eq.daily&select=date,title,summary,content&order=date.desc');
    var el = document.getElementById('daily-list');
    el.innerHTML = posts.length ? buildGroupedList(posts) : '<p>尚無日報</p>';
  }

  async function loadMonthly() {
    var posts = await apiFetch('type=eq.monthly&select=date,title,summary,content&order=date.desc');
    var el = document.getElementById('monthly-list');
    el.innerHTML = posts.length ? buildList(posts, fmtMonth) : '<p>尚無月度回顧</p>';
  }

  async function loadYearly() {
    var posts = await apiFetch('type=eq.yearly&select=date,title,summary,content&order=date.desc');
    var el = document.getElementById('yearly-list');
    el.innerHTML = posts.length ? buildList(posts, fmtYear) : '<p>尚無年度回顧</p>';
  }

  // Load all sections
  Promise.all([loadToday(), loadDaily(), loadMonthly(), loadYearly()])
    .catch(function(e) { console.error('Load error:', e); });
})();
</script>
