<script>
// Short link router: dailyai.tw/?s=N redirects to the corresponding article
(function() {
  var LINKS = window.DAILYAI_SHORT_LINKS || {};
  var s = new URLSearchParams(window.location.search).get('s');
  if (s && LINKS[s]) { window.location.replace('/view-feature?slug=' + LINKS[s]); }
})();
</script>

<div id="app">

  <div id="top-bar" style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
    <div id="page-subtitle" style="font-size:0.9em;color:#888;"></div>
    <a id="fb-share-top" href="#" target="_blank" rel="noopener" class="share-icon share-fb" title="" style="display:inline-flex;align-items:center;gap:6px;color:#1877f2;text-decoration:none;font-size:0.85em;font-weight:500;">

  <script>

    var shareUrl = isEn ? 'https://dailyai.tw/?lang=en' : 'https://dailyai.tw/';
    var shareTitle = isEn ? 'Daily AI Taiwan — Taiwan\'s Daily AI Briefing' : 'Daily AI Taiwan — 立足台灣，讀懂 AI';
    var fbUrl = 'https://www.facebook.com/sharer/sharer.php?u=' + encodeURIComponent(shareUrl) + '&quote=' + encodeURIComponent(shareTitle);
    document.getElementById('fb-share-top').href = fbUrl;
    document.getElementById('fb-share-top').title = isEn ? 'Share on Facebook' : '分享到 Facebook';
    document.getElementById('fb-share-text').textContent = isEn ? 'Share' : '分享';
    document.getElementById('page-subtitle').textContent = isEn
      ? 'Daily AI news from a Taiwan perspective, in English'
      : '每日追蹤全球 AI 產業動態';
  })();
  </script>

  <div id="today-post">
    <h2 id="today-heading"></h2>
  </div>

  <!-- Feature Articles -->
  <div id="feature-section" style="display:none;">
    <h2 id="feature-heading"></h2>
    <div id="feature-list"></div>
  </div>

  <hr>

  <h2 id="daily-heading"></h2>
  <div id="daily-list"><p id="daily-loading"></p></div>

  <hr>

  <h2 id="monthly-heading"></h2>
  <div id="monthly-list"><p id="monthly-loading"></p></div>

  <hr>

  <h2 id="yearly-heading"></h2>
  <div id="yearly-list"><p id="yearly-loading"></p></div>

  <script>
  // Set bilingual headings
  document.getElementById('today-heading').textContent = t('📰 載入今日日報中...', '📰 Loading today\'s briefing...');
  document.getElementById('feature-heading').textContent = t('🔥 本月精選專題', '🔥 Featured Articles');
  document.getElementById('daily-heading').textContent = t('📅 日報列表', '📅 Daily Briefings');
  document.getElementById('daily-loading').textContent = t('載入中...', 'Loading...');
  document.getElementById('monthly-heading').textContent = t('📊 月度回顧', '📊 Monthly Reviews');
  document.getElementById('monthly-loading').textContent = t('載入中...', 'Loading...');
  document.getElementById('yearly-heading').textContent = t('📚 年度回顧', '📚 Annual Reviews');
  document.getElementById('yearly-loading').textContent = t('載入中...', 'Loading...');
  </script>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
(function() {
  const SB_URL = window.DAILYAI_SB_URL;
  const SB_KEY = window.DAILYAI_SB_KEY;

  function esc(s) { var d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

  async function apiFetch(query) {
    try {
      if (!SB_URL || !SB_KEY) throw new Error('Missing SB config: URL=' + SB_URL + ' KEY=' + (SB_KEY ? SB_KEY.substring(0,10) + '...' : 'undefined'));
      var controller = new AbortController();
      var timeout = setTimeout(function() { controller.abort(); }, 10000);
      var res = await fetch(SB_URL + '/rest/v1/posts?' + query, {
        headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY },
        signal: controller.signal
      });
      clearTimeout(timeout);
      if (!res.ok) throw new Error('API error: ' + res.status);
      return await res.json();
    } catch (e) {
      console.error('Supabase fetch error:', e);
      return [];
    }
  }

  function fmt(d) {
    const dt = new Date(d + 'T00:00:00');
    return dt.getFullYear() + '/' + String(dt.getMonth()+1).padStart(2,'0') + '/' + String(dt.getDate()).padStart(2,'0');
  }
  var MONTHS_EN = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  function fmtMonth(d) {
    var dt = new Date(d + 'T00:00:00');
    if (getLang() === 'en') return MONTHS_EN[dt.getMonth()] + ' ' + dt.getFullYear();
    return dt.getFullYear() + ' 年 ' + (dt.getMonth()+1) + ' 月';
  }
  function fmtYear(d) {
    return new Date(d + 'T00:00:00').getFullYear() + (getLang() === 'en' ? '' : ' 年');
  }

  function addTableLabels(container) {
    container.querySelectorAll('table').forEach(function(table) {
      var headers = [];
      table.querySelectorAll('thead th').forEach(function(th) {
        headers.push(th.textContent.trim());
      });
      if (headers.length === 0) return;
      table.querySelectorAll('tbody tr').forEach(function(tr) {
        tr.querySelectorAll('td').forEach(function(td, i) {
          if (headers[i]) td.setAttribute('data-label', headers[i]);
        });
      });
    });
  }

  function trackPostView(date, type) {
    var email = null;
    try {
      var stored = localStorage.getItem('sb-kszbdgfbihnawjgmwjlk-auth-token');
      if (stored) { var s = JSON.parse(stored); if (s && s.user) email = s.user.email; }
    } catch(e) {}
    fetch(SB_URL + '/rest/v1/post_views', {
      method: 'POST',
      headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
      body: JSON.stringify({ post_date: date, post_type: type, user_email: email })
    }).catch(function(){});
  }

  // URL param-based links (classic navigation, no popup)
  function postUrl(date, type) {
    var lp = langParam();
    if (type === 'monthly') return '/post?month=' + encodeURIComponent(date.substring(0, 7)) + '&type=monthly' + lp;
    if (type === 'yearly') return '/post?year=' + encodeURIComponent(date.substring(0, 4)) + '&type=yearly' + lp;
    return '/post?date=' + encodeURIComponent(date) + '&type=' + encodeURIComponent(type) + lp;
  }

  function featureUrl(slug) {
    return '/view-feature?slug=' + encodeURIComponent(slug) + langParam();
  }

  function buildList(posts, formatFn) {
    return '<ul>' + posts.map(function(p) {
      return '<li><a href="' + postUrl(p.date, p.type) + '">' +
        '<strong>' + formatFn(p.date) + '</strong></a> — ' + esc(pickField(p, 'summary') || pickField(p, 'title')) + '</li>';
    }).join('') + '</ul>';
  }

  function buildGroupedList(posts) {
    var groups = {};
    posts.forEach(function(p) {
      var ym = p.date.substring(0, 7);
      if (!groups[ym]) groups[ym] = [];
      groups[ym].push(p);
    });

    var keys = Object.keys(groups).sort().reverse();
    var html = '';
    keys.forEach(function(ym, idx) {
      var d = new Date(ym + '-01T00:00:00');
      var label = getLang() === 'en' ? MONTHS_EN[d.getMonth()] + ' ' + d.getFullYear() : d.getFullYear() + ' 年 ' + (d.getMonth()+1) + ' 月';
      var count = groups[ym].length;
      var open = idx === 0 ? 'open' : '';
      html += '<details ' + open + ' class="month-group">';
      html += '<summary><strong>' + label + '</strong> <span class="month-count">(' + count + (getLang()==='en'?' articles':' 篇') + ')</span></summary>';
      html += '<ul>';
      groups[ym].forEach(function(p) {
        html += '<li><a href="' + postUrl(p.date, p.type) + '">' +
          '<strong>' + fmt(p.date) + '</strong></a> — ' + esc(pickField(p, 'summary') || pickField(p, 'title')) + '</li>';
      });
      html += '</ul></details>';
    });
    return html;
  }

  async function loadToday() {
    var today = new Date().toISOString().split('T')[0];
    var data = await apiFetch('type=eq.daily&date=eq.' + today + '&select=*');
    var el = document.getElementById('today-post');

    if (data.length > 0) {
      var content = pickContent(data[0], 'content');
      var html = marked.parse(content);
      var todayHeading = getLang() === 'en'
        ? '<h2>🧠 Today\'s (' + fmt(data[0].date) + ') AI Highlights</h2>'
        : '<h2>🧠 今日 (' + fmt(data[0].date) + ') AI 重點</h2>';
      html = html.replace(/<h2[^>]*>🧠[^<]*<\/h2>/, '');
      html = todayHeading + html.replace(/^\s*<hr>/, '');
      el.innerHTML = html;
      addTableLabels(el);
      trackPostView(data[0].date, 'daily');
    } else {
      var latest = await apiFetch('type=eq.daily&select=*&order=date.desc&limit=1');
      if (latest.length > 0) {
        var latestContent = pickContent(latest[0], 'content');
        var notice = getLang() === 'en'
          ? '<p style="color:#888;font-style:italic;">Today\'s briefing not yet published. Showing latest (' + fmt(latest[0].date) + '):</p>'
          : '<p style="color:#888;font-style:italic;">今日日報尚未發布，以下為最新日報（' + fmt(latest[0].date) + '）：</p>';
        el.innerHTML = notice + marked.parse(latestContent);
        addTableLabels(el);
        trackPostView(latest[0].date, 'daily');
      } else {
        el.innerHTML = '<p>' + t('尚無日報', 'No briefings yet') + '</p>';
      }
    }
  }

  async function loadDaily() {
    var posts = await apiFetch('type=eq.daily&select=date,type,title,summary,title_en,summary_en&order=date.desc');
    var el = document.getElementById('daily-list');
    el.innerHTML = posts.length ? buildGroupedList(posts) : '<p>' + t('尚無日報','No briefings yet') + '</p>';
  }

  async function loadMonthly() {
    var posts = await apiFetch('type=eq.monthly&select=date,type,title,summary,title_en,summary_en&order=date.desc');
    var el = document.getElementById('monthly-list');
    el.innerHTML = posts.length ? buildList(posts, fmtMonth) : '<p>' + t('尚無月度回顧','No monthly reviews yet') + '</p>';
  }

  async function loadYearly() {
    var posts = await apiFetch('type=eq.yearly&select=date,type,title,summary,title_en,summary_en&order=date.desc');
    var el = document.getElementById('yearly-list');
    el.innerHTML = posts.length ? buildList(posts, fmtYear) : '<p>' + t('尚無年度回顧','No annual reviews yet') + '</p>';
  }

  var featureOffset = 0;
  var FEATURE_INITIAL = 7;
  var FEATURE_BATCH = 5;
  var allFeaturesLoaded = false;

  function renderFeatureCard(p) {
    var furl = p.slug ? featureUrl(p.slug) : postUrl(p.date, 'feature');
    var isFree = p.is_free === true;
    return '<a href="' + furl + '" class="feature-card-link"><div class="feature-card">' +
      '<div class="feature-tags">' +
      '<div class="feature-tag">' + t('專題','Feature') + '</div>' +
      (isFree ? '<div class="feature-tag-public">' + t('免費閱讀','Free') + '</div>' : '') +
      '</div>' +
      '<h3 class="feature-title">' + esc(pickField(p, 'title')) + '</h3>' +
      '<p class="feature-summary">' + esc(pickField(p, 'summary')) + '</p>' +
      '<div class="feature-footer"><span class="feature-date">' + fmt(p.date) + '</span>' +
      '<span class="feature-link">' + t('閱讀全文 →','Read more →') + '</span></div>' +
      '</div></a>';
  }

  async function loadFeatures() {
    var limit = FEATURE_INITIAL;
    var posts = await apiFetch('type=eq.feature&select=date,type,title,summary,slug,is_free,title_en,summary_en&order=date.desc&limit=' + limit);
    if (posts.length === 0) return;
    document.getElementById('feature-section').style.display = 'block';
    var html = '<div class="feature-grid" id="feature-grid">';
    posts.forEach(function(p) { html += renderFeatureCard(p); });
    html += '</div>';
    if (posts.length >= limit) {
      html += '<div id="feature-load-more" style="text-align:center;margin-top:16px;">' +
        '<button onclick="loadMoreFeatures()" class="load-more-btn">' + t('載入更多專題','Load more') + '</button></div>';
    }
    document.getElementById('feature-list').innerHTML = html;
    featureOffset = posts.length;
  }

  async function loadMoreFeatures() {
    if (allFeaturesLoaded) return;
    var btn = document.querySelector('#feature-load-more button');
    btn.textContent = t('載入中...','Loading...');
    btn.disabled = true;
    var posts = await apiFetch('type=eq.feature&select=date,type,title,summary,slug,is_free,title_en,summary_en&order=date.desc&limit=' + FEATURE_BATCH + '&offset=' + featureOffset);
    var grid = document.getElementById('feature-grid');
    posts.forEach(function(p) { grid.insertAdjacentHTML('beforeend', renderFeatureCard(p)); });
    featureOffset += posts.length;
    if (posts.length < FEATURE_BATCH) {
      document.getElementById('feature-load-more').remove();
      allFeaturesLoaded = true;
    } else {
      btn.textContent = t('載入更多專題','Load more');
      btn.disabled = false;
    }
  }
  // expose to onclick
  window.loadMoreFeatures = loadMoreFeatures;

  // Load each section independently so one failure doesn't block others
  loadToday().catch(function(e) { console.error('loadToday error:', e); document.getElementById('today-post').innerHTML = '<p style="color:red;">載入失敗</p>'; });
  loadFeatures().catch(function(e) { console.error('loadFeatures error:', e); });
  loadDaily().catch(function(e) { console.error('loadDaily error:', e); document.getElementById('daily-list').innerHTML = '<p style="color:red;">載入失敗</p>'; });
  loadMonthly().catch(function(e) { console.error('loadMonthly error:', e); document.getElementById('monthly-list').innerHTML = '<p style="color:red;">載入失敗</p>'; });
  loadYearly().catch(function(e) { console.error('loadYearly error:', e); document.getElementById('yearly-list').innerHTML = '<p style="color:red;">載入失敗</p>'; });
})();
</script>

<style>
#app { margin-top: -1em; }
#app h1 { margin-bottom: 0.2em; }
#today-post h2:first-child { margin-top: 0; }
#app blockquote { color: #666; border-left: 3px solid #2a7ae2; padding-left: 1em; margin: 0.5em 0 1em; }
#app ul { list-style: none; padding: 0; }
#app ul li { padding: 8px 0; border-bottom: 1px solid #eee; }
#app ul li:last-child { border-bottom: none; }
#app ul li a { color: #2a7ae2; text-decoration: none; }
#app ul li a:hover { text-decoration: underline; }
.month-group { margin: 8px 0; }
.month-group summary { cursor: pointer; padding: 8px 0; font-size: 15px; border-bottom: 1px solid #eee; }
.month-group summary:hover { color: #2a7ae2; }
.month-count { color: #999; font-weight: normal; font-size: 13px; }
.month-group[open] summary { color: #2a7ae2; }

/* Feature articles */
.feature-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 16px; }
.feature-tags { display: flex; gap: 6px; align-items: center; margin-bottom: 10px; }
.feature-tag-public {
  display: inline-block; background: #22c55e; color: #fff;
  font-size: 0.7em; padding: 2px 10px; border-radius: 12px;
  font-weight: 600; width: fit-content;
}
.feature-card {
  border: 1px solid #e5e7eb; border-radius: 12px; padding: 20px;
  background: #fff; cursor: pointer; transition: all 0.2s;
  display: flex; flex-direction: column;
}
.feature-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.1); border-color: #2a7ae2; transform: translateY(-2px); }
.feature-tag {
  display: inline-block; background: #ef4444; color: #fff;
  font-size: 0.7em; padding: 2px 10px; border-radius: 12px;
  font-weight: 600; width: fit-content;
}
.feature-title { font-size: 1.1em; margin: 0 0 8px; color: #333; line-height: 1.4; }
.feature-summary { font-size: 0.85em; color: #666; line-height: 1.5; flex: 1; margin-bottom: 10px; }
.feature-card-link { text-decoration: none !important; color: inherit; }
.feature-card-link:hover { text-decoration: none !important; }
.feature-footer { display: flex; justify-content: space-between; align-items: center; margin-top: auto; }
.feature-date { font-size: 0.75em; color: #999; }
.feature-link { font-size: 0.85em; color: #2a7ae2; font-weight: 500; }
.load-more-btn {
  padding: 10px 28px; background: #fff; color: #2a7ae2;
  border: 1px solid #2a7ae2; border-radius: 24px; font-size: 0.95em;
  font-weight: 600; cursor: pointer; transition: all 0.2s;
}
.load-more-btn:hover { background: #2a7ae2; color: #fff; }
.load-more-btn:disabled { opacity: 0.5; cursor: not-allowed; }

/* Tables as cards */
#today-post table {
  width: 100%; border: none !important; border-collapse: separate;
  border-spacing: 0 12px; margin: 1em 0; font-size: 0.9em;
}
#today-post thead { display: none; }
#today-post tbody { display: block; }
#today-post tr {
  display: block; background: #f9fafb; border: 1px solid #e5e7eb;
  border-radius: 10px; padding: 14px 16px; margin-bottom: 10px; transition: box-shadow 0.2s;
}
#today-post tr:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
#today-post td {
  display: flex; justify-content: space-between; align-items: flex-start;
  border: none !important; padding: 3px 0; font-size: 0.9em; line-height: 1.5;
}
#today-post td:first-child {
  font-weight: 700; font-size: 1em; color: #333;
  padding-bottom: 4px; border-bottom: 1px solid #eee !important; margin-bottom: 4px;
}
#today-post td::before {
  content: attr(data-label); font-weight: 600; color: #666;
  min-width: 60px; margin-right: 8px; flex-shrink: 0; font-size: 0.85em;
}
#today-post blockquote { border-left: 3px solid #ddd; padding-left: 1em; color: #888; font-size: 0.78em; line-height: 1.6; }
#today-post blockquote p { margin: 0.2em 0; }
#today-post blockquote a { color: #999; font-size: inherit; text-decoration: none; }
#today-post blockquote a:hover { text-decoration: underline; }
#today-post blockquote ul { list-style: disc; padding-left: 1.5em; margin: 0.3em 0; }
#today-post blockquote li { padding: 2px 0; border: none !important; font-size: 0.95em; font-style: normal; }
#today-post blockquote li::before { content: "\00B7 "; color: #bbb; }
#today-post a { color: #2a7ae2; }
#today-post hr { border: none; border-top: 1px solid #eee; margin: 1.5em 0; }

/* Mobile responsive */
@media (max-width: 768px) {
  #app h1 { font-size: 1.3em; }
}
@media (max-width: 480px) {
  #app h1 { font-size: 1.1em; }
  #today-post td {
    flex-direction: column;
    align-items: flex-start;
  }
}
</style>
