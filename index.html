  </blockquote>

<div id="post-modal" style="display:none;">
  <div id="post-modal-overlay" onclick="closeModal()"></div>
  <div id="post-modal-content">
    <button onclick="closeModal()" class="modal-close">&times;</button>
    <div id="post-modal-body"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
const SB_URL = 'https://kszbdgfbihnawjgmwjlk.supabase.co';
const SB_KEY = 'sb_publishable_VrgzauRQ_kV_2MD0ujZ39w_0KREni_f';

async function fetchPosts(type, order) {
  const res = await fetch(
    `${SB_URL}/rest/v1/posts?type=eq.${type}&select=date,title,summary,content&order=date.${order || 'desc'}`,
    { headers: { 'apikey': SB_KEY } }
  );
  return res.json();
}

function formatDate(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`;
}

function formatMonth(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  return `${d.getFullYear()} 年 ${d.getMonth()+1} 月`;
}

function formatYear(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  return `${d.getFullYear()} 年`;
}

function showPost(content) {
  document.getElementById('post-modal-body').innerHTML = marked.parse(content);
  document.getElementById('post-modal').style.display = 'flex';
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('post-modal').style.display = 'none';
  document.body.style.overflow = '';
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeModal();
});

async function loadToday() {
  const today = new Date().toISOString().split('T')[0];
  const res = await fetch(
    `${SB_URL}/rest/v1/posts?type=eq.daily&date=eq.${today}&select=*`,
    { headers: { 'apikey': SB_KEY } }
  );
  const data = await res.json();
  const el = document.getElementById('today-post');

  if (data.length > 0) {
    const post = data[0];
    el.innerHTML = marked.parse(post.content);
  } else {
    // Show latest post if no today
    const latest = await fetch(
      `${SB_URL}/rest/v1/posts?type=eq.daily&select=*&order=date.desc&limit=1`,
      { headers: { 'apikey': SB_KEY } }
    );
    const latestData = await latest.json();
    if (latestData.length > 0) {
      el.innerHTML = `<p style="color:#888;font-style:italic;">今日日報尚未發布，以下為最新日報（${formatDate(latestData[0].date)}）：</p>` + marked.parse(latestData[0].content);
    } else {
      el.innerHTML = '<p>尚無日報</p>';
    }
  }
}

async function loadDaily() {
  const posts = await fetchPosts('daily');
  const el = document.getElementById('daily-list');
  if (posts.length === 0) {
    el.innerHTML = '<p>尚無日報</p>';
    return;
  }
  el.innerHTML = '<ul>' + posts.map(p =>
    `<li><a href="javascript:void(0)" onclick='showPost(${JSON.stringify(JSON.stringify(p.content))})'>
      <strong>${formatDate(p.date)}</strong></a> — ${p.summary || p.title}
    </li>`
  ).join('') + '</ul>';
}

async function loadMonthly() {
  const posts = await fetchPosts('monthly');
  const el = document.getElementById('monthly-list');
  if (posts.length === 0) {
    el.innerHTML = '<p>尚無月度回顧</p>';
    return;
  }
  el.innerHTML = '<ul>' + posts.map(p =>
    `<li><a href="javascript:void(0)" onclick='showPost(${JSON.stringify(JSON.stringify(p.content))})'>
      <strong>${formatMonth(p.date)}</strong></a> — ${p.summary || p.title}
    </li>`
  ).join('') + '</ul>';
}

async function loadYearly() {
  const posts = await fetchPosts('yearly');
  const el = document.getElementById('yearly-list');
  if (posts.length === 0) {
    el.innerHTML = '<p>尚無年度回顧</p>';
    return;
  }
  el.innerHTML = '<ul>' + posts.map(p =>
    `<li><a href="javascript:void(0)" onclick='showPost(${JSON.stringify(JSON.stringify(p.content))})'>
      <strong>${formatYear(p.date)}</strong></a> — ${p.summary || p.title}
    </li>`
  ).join('') + '</ul>';
}

// Load all
loadToday();
loadDaily();
loadMonthly();
loadYearly();
</script>
