<header class="site-header" role="banner">
  <div class="wrapper header-wrapper">
    <div class="header-left">
      <a class="site-title" rel="author" href="{{ "/" | relative_url }}">Daily AI Taiwan</a>
      <span class="site-tagline" id="site-tagline">立足台灣，讀懂 AI</span>
    </div>

    <div class="header-right">
      <a href="/biz-plan" class="demos-btn" id="bizplan-btn">🎯 AI 商業計畫</a>
      <a href="/partner" class="partner-btn" id="partner-btn">🤝 共同創辦</a>
      <span class="lang-toggle" id="lang-toggle"></span>
      <span class="auth-nav-container" id="auth-nav">
        <a href="/login" class="auth-login-link">登入 / 註冊</a>
      </span>
    </div>
  </div>
</header>

<script>
(function() {
  var lang = getLang();
  // Tagline
  document.getElementById('site-tagline').textContent = lang === 'en' ? "Taiwan's Daily AI Briefing" : '立足台灣，讀懂 AI';
  // Language toggle
  var toggle = document.getElementById('lang-toggle');
  if (lang === 'en') {
    toggle.innerHTML = '<a href="#" class="lang-btn" onclick="setLang(\'zh\');return false;">中文</a><span class="lang-sep">|</span><span class="lang-active">EN</span>';
  } else {
    toggle.innerHTML = '<span class="lang-active">中文</span><span class="lang-sep">|</span><a href="#" class="lang-btn" onclick="setLang(\'en\');return false;">EN</a>';
  }
  // Demos button
  var demosBtn = document.getElementById('demos-btn');
  if (demosBtn) demosBtn.textContent = lang === 'en' ? '🚀 Demos' : '🚀 Demo';
  // Biz Plan button
  var bizBtn = document.getElementById('bizplan-btn');
  if (bizBtn) bizBtn.textContent = lang === 'en' ? '🎯 Biz Plans' : '🎯 AI 商業計畫';
  // Partner button
  var partnerBtn = document.getElementById('partner-btn');
  if (partnerBtn) partnerBtn.textContent = lang === 'en' ? '🤝 Co-Found' : '🤝 共同創辦';
  // Auth nav default text
  var authNav = document.getElementById('auth-nav');
  if (authNav && authNav.querySelector('.auth-login-link')) {
    authNav.querySelector('.auth-login-link').textContent = lang === 'en' ? 'Login / Sign Up' : '登入 / 註冊';
  }
})();
</script>

<style>
.header-left { display: flex; align-items: baseline; gap: 12px; }
.site-tagline { font-size: 0.8em; color: #888; letter-spacing: 0.3px; white-space: nowrap; }
.header-right { display: flex; align-items: center; gap: 12px; }
.lang-toggle { font-size: 13px; white-space: nowrap; }
.lang-active { font-weight: 700; color: #333; }
.lang-sep { color: #ccc; margin: 0 4px; }
.lang-btn { color: #2a7ae2; text-decoration: none; }
.lang-btn:hover { text-decoration: underline; }
.demos-btn {
  font-size: 13px;
  padding: 4px 12px;
  background: #eff6ff;
  color: #2563eb !important;
  border: 1px solid #bfdbfe;
  border-radius: 16px;
  text-decoration: none !important;
  font-weight: 600;
  white-space: nowrap;
  transition: all 0.15s;
}
.demos-btn:hover { background: #dbeafe; border-color: #93c5fd; }
.partner-btn {
  font-size: 13px;
  padding: 4px 12px;
  background: #f0fdf4;
  color: #16a34a !important;
  border: 1px solid #bbf7d0;
  border-radius: 16px;
  text-decoration: none !important;
  font-weight: 600;
  white-space: nowrap;
  transition: all 0.15s;
}
.partner-btn:hover { background: #dcfce7; border-color: #86efac; }
@media (max-width: 480px) {
  .site-tagline { display: none; }
  .demos-btn { font-size: 12px; padding: 3px 8px; }
  .partner-btn { font-size: 12px; padding: 3px 8px; }
}
</style>
