---
layout: default
title: Daily AI Taiwan
permalink: /post/
---

<div id="post-app">
  <div id="post-loading" style="text-align:center; padding:40px; color:#888;">載入中...</div>
  <div id="post-content" style="display:none;"></div>
  <div id="post-not-found" style="display:none; text-align:center; padding:40px;">
    <h2>找不到這篇文章</h2>
    <p style="color:#888;">請確認網址是否正確。</p>
    <a href="/" style="color:#2a7ae2;">← 回首頁</a>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
(function() {
  var SB_URL = 'https://kszbdgfbihnawjgmwjlk.supabase.co';
  var SB_KEY = 'sb_publishable_VrgzauRQ_kV_2MD0ujZ39w_0KREni_f';

  // Parse URL: /post/2026-03-18 or /post/2026-01 or /post/2025
  var rawPath = sessionStorage.getItem('post_path') || window.location.pathname;
  sessionStorage.removeItem('post_path');
  var path = rawPath.replace(/\/$/, '').replace('/post/', '').replace('/post', '');
  if (!path) { window.location.href = '/'; return; }

  var date, type, query;

  if (/^\d{4}-\d{2}-\d{2}$/.test(path)) {
    // Daily: /post/2026-03-18
    date = path;
    type = 'daily';
    query = 'type=eq.daily&date=eq.' + date + '&select=*';
  } else if (/^\d{4}-\d{2}$/.test(path)) {
    // Monthly: /post/2026-01
    date = path + '-01';
    type = 'monthly';
    query = 'type=eq.monthly&date=eq.' + date + '&select=*';
  } else if (/^\d{4}$/.test(path)) {
    // Yearly: /post/2025
    date = path + '-12-31';
    type = 'yearly';
    query = 'type=eq.yearly&date=eq.' + date + '&select=*';
  } else {
    document.getElementById('post-loading').style.display = 'none';
    document.getElementById('post-not-found').style.display = 'block';
    return;
  }

  fetch(SB_URL + '/rest/v1/posts?' + query, {
    headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY }
  })
  .then(function(res) { return res.json(); })
  .then(function(data) {
    document.getElementById('post-loading').style.display = 'none';

    if (data.length === 0) {
      document.getElementById('post-not-found').style.display = 'block';
      return;
    }

    var post = data[0];
    document.title = post.title + ' — Daily AI Taiwan';

    var html = '<div style="margin-bottom:12px;">' +
      '<a href="/" style="color:#2a7ae2;text-decoration:none;font-size:0.9em;">← 回首頁</a>' +
      '</div>';
    html += marked.parse(post.content);

    // Share buttons
    var shareUrl = encodeURIComponent(window.location.href);
    var shareTitle = encodeURIComponent(post.title);
    html += '<div style="margin-top:2em;padding-top:1em;border-top:1px solid #eee;">' +
      '<span style="color:#888;font-size:0.9em;">分享：</span> ' +
      '<a href="https://twitter.com/intent/tweet?url=' + shareUrl + '&text=' + shareTitle + '" target="_blank" style="color:#1da1f2;margin:0 8px;text-decoration:none;">𝕏</a>' +
      '<a href="https://www.facebook.com/sharer/sharer.php?u=' + shareUrl + '" target="_blank" style="color:#1877f2;margin:0 8px;text-decoration:none;">Facebook</a>' +
      '<a href="https://www.linkedin.com/sharing/share-offsite/?url=' + shareUrl + '" target="_blank" style="color:#0a66c2;margin:0 8px;text-decoration:none;">LinkedIn</a>' +
      '<button onclick="navigator.clipboard.writeText(window.location.href).then(function(){alert(\'已複製連結！\')})" style="border:1px solid #ddd;background:#fff;padding:3px 10px;border-radius:4px;cursor:pointer;font-size:0.85em;margin-left:8px;">複製連結</button>' +
      '</div>';

    var el = document.getElementById('post-content');
    el.innerHTML = html;
    el.style.display = 'block';

    // Add table labels for cards
    var tables = el.querySelectorAll('table');
    tables.forEach(function(table) {
      var headers = [];
      table.querySelectorAll('thead th').forEach(function(th) { headers.push(th.textContent.trim()); });
      if (headers.length === 0) return;
      table.querySelectorAll('tbody tr').forEach(function(tr) {
        tr.querySelectorAll('td').forEach(function(td, i) {
          if (headers[i]) td.setAttribute('data-label', headers[i]);
        });
      });
    });

    // Track view
    fetch(SB_URL + '/rest/v1/post_views', {
      method: 'POST',
      headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
      body: JSON.stringify({ post_date: date, post_type: type })
    }).catch(function(){});
  })
  .catch(function() {
    document.getElementById('post-loading').style.display = 'none';
    document.getElementById('post-not-found').style.display = 'block';
  });
})();
</script>

<style>
#post-content { line-height: 1.8; }
#post-content h1 { font-size: 1.5em; }
#post-content h2 { font-size: 1.3em; margin-top: 1.5em; }
#post-content table { width: 100%; border: none !important; border-collapse: separate; border-spacing: 0 12px; margin: 1em 0; font-size: 0.9em; }
#post-content thead { display: none; }
#post-content tbody { display: block; }
#post-content tr { display: block; background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 10px; padding: 14px 16px; margin-bottom: 10px; }
#post-content tr:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
#post-content td { display: flex; justify-content: space-between; border: none !important; padding: 3px 0; font-size: 0.9em; line-height: 1.5; }
#post-content td:first-child { font-weight: 700; font-size: 1em; color: #333; padding-bottom: 4px; border-bottom: 1px solid #eee !important; margin-bottom: 4px; }
#post-content td::before { content: attr(data-label); font-weight: 600; color: #666; min-width: 60px; margin-right: 8px; flex-shrink: 0; font-size: 0.85em; }
#post-content blockquote { border-left: 3px solid #ddd; padding-left: 1em; color: #888; font-size: 0.78em; line-height: 1.6; }
#post-content blockquote p { margin: 0.2em 0; }
#post-content blockquote a { color: #999; text-decoration: none; }
#post-content blockquote ul { list-style: none; padding: 0; margin: 0.3em 0; }
#post-content blockquote li { padding: 1px 0; border: none !important; font-size: 0.95em; }
#post-content blockquote li::before { content: "· "; color: #bbb; }
#post-content a { color: #2a7ae2; }
#post-content hr { border: none; border-top: 1px solid #eee; margin: 1.5em 0; }
</style>
