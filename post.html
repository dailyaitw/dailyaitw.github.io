---
layout: default
title: Daily AI Taiwan
sitemap: false
---

<div id="post-app">
  <div id="post-loading" style="text-align:center; padding:40px; color:#888;">載入中...</div>
  <div id="post-content" style="display:none;"></div>
  <div id="post-not-found" style="display:none; text-align:center; padding:40px;">
    <h2>找不到這篇文章</h2>
    <p style="color:#888;">請確認網址是否正確。</p>
    <a href="/" style="color:#2a7ae2;">← 回首頁</a>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
(function() {
  var SB_URL = 'https://kszbdgfbihnawjgmwjlk.supabase.co';
  var SB_KEY = 'sb_publishable_VrgzauRQ_kV_2MD0ujZ39w_0KREni_f';

  // Read from URL params: /post/?date=2026-03-18&type=daily
  var params = new URLSearchParams(window.location.search);
  var type = params.get('type') || 'daily';
  var date = params.get('date');
  var month = params.get('month');
  var year = params.get('year');

  // Build date from params
  if (type === 'monthly' && month) date = month + '-01';
  if (type === 'yearly' && year) date = year + '-12-31';

  if (!date) { window.location.href = '/'; return; }

  var query;
  if (type === 'daily') {
    query = 'type=eq.daily&date=eq.' + date + '&select=*';
  } else if (type === 'monthly') {
    query = 'type=eq.monthly&date=eq.' + date + '&select=*';
  } else if (type === 'yearly') {
    query = 'type=eq.yearly&date=eq.' + date + '&select=*';
  } else if (type === 'feature') {
    query = 'type=eq.feature&date=eq.' + date + '&select=*';
  } else {
    document.getElementById('post-loading').style.display = 'none';
    document.getElementById('post-not-found').style.display = 'block';
    return;
  }

  fetch(SB_URL + '/rest/v1/posts?' + query, {
    headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY }
  })
  .then(function(res) { return res.json(); })
  .then(function(data) {
    document.getElementById('post-loading').style.display = 'none';

    if (data.length === 0) {
      document.getElementById('post-not-found').style.display = 'block';
      return;
    }

    var post = data[0];
    document.title = post.title + ' — Daily AI Taiwan';

    var isLoggedIn = false;
    try {
      var stored = localStorage.getItem('sb-kszbdgfbihnawjgmwjlk-auth-token');
      if (stored) { var sess = JSON.parse(stored); if (sess && sess.user) isLoggedIn = true; }
    } catch(e) {}

    var postDate = new Date(date + 'T00:00:00');
    var now = new Date();
    var diffDays = Math.floor((now - postDate) / (1000 * 60 * 60 * 24));
    var isFree = (type === 'daily' && diffDays <= 7) || isLoggedIn;
    if (type !== 'daily' && !isLoggedIn) isFree = false;

    var fullContent = marked.parse(post.content);
    // Show 今日 only when viewing today's post
    var todayStr = new Date().toISOString().split('T')[0];
    if (type === 'daily' && date === todayStr) {
      var dateFmt = date.replace(/-/g, '/');
      fullContent = fullContent.replace(/🧠\s*\d{4}\/\d{2}\/\d{2}\s*AI\s*重點/, '🧠 今日 (' + dateFmt + ') AI 重點');
    }

    var html = '<div style="margin-bottom:12px;">' +
      '<a href="/" style="color:#2a7ae2;text-decoration:none;font-size:0.9em;">← 回首頁</a>' +
      '</div>';

    if (!isFree) {
      var previewDiv = document.createElement('div');
      previewDiv.innerHTML = fullContent;
      var allElements = previewDiv.querySelectorAll('h1,h2,h3,p,ul,ol,table,blockquote,hr');
      var showCount = Math.max(3, Math.floor(allElements.length * 0.3));
      var previewHtml = '';
      for (var i = 0; i < Math.min(showCount, allElements.length); i++) {
        previewHtml += allElements[i].outerHTML;
      }
      html += previewHtml;
      html += '<div class="paywall-overlay"></div>';
      html += '<div class="paywall-box">';
      html += '<h3>🔒 註冊免費閱讀完整內容</h3>';
      if (type === 'daily') {
        html += '<p>超過 7 天的日報需要登入才能閱讀。<br>免費註冊即可解鎖所有歷史日報！</p>';
      } else {
        html += '<p>月度回顧和年度回顧需要登入才能閱讀。<br>免費註冊即可解鎖！</p>';
      }
      html += '<a href="/login?redirect=' + encodeURIComponent(window.location.href) + '" class="paywall-btn">免費註冊 / 登入</a>';
      html += '<p style="font-size:0.8em;color:#999;margin-top:12px;">支援 Email、Google、GitHub、Discord 登入</p>';
      html += '</div>';
    } else {
      html += fullContent;
    }

    var el = document.getElementById('post-content');
    el.innerHTML = html;
    el.style.display = 'block';

    // Add table labels for cards
    var tables = el.querySelectorAll('table');
    tables.forEach(function(table) {
      var headers = [];
      table.querySelectorAll('thead th').forEach(function(th) { headers.push(th.textContent.trim()); });
      if (headers.length === 0) return;
      table.querySelectorAll('tbody tr').forEach(function(tr) {
        tr.querySelectorAll('td').forEach(function(td, i) {
          if (headers[i]) td.setAttribute('data-label', headers[i]);
        });
      });
    });

    // Track view
    fetch(SB_URL + '/rest/v1/post_views', {
      method: 'POST',
      headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
      body: JSON.stringify({ post_date: date, post_type: type })
    }).catch(function(){});
  })
  .catch(function() {
    document.getElementById('post-loading').style.display = 'none';
    document.getElementById('post-not-found').style.display = 'block';
  });
})();
</script>

<style>
#post-content { line-height: 1.8; }
#post-content h1 { font-size: 1.5em; }
#post-content h2 { font-size: 1.3em; margin-top: 1.5em; }
#post-content table { width: 100%; border: none !important; border-collapse: separate; border-spacing: 0 12px; margin: 1em 0; font-size: 0.9em; }
#post-content thead { display: none; }
#post-content tbody { display: block; }
#post-content tr { display: block; background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 10px; padding: 14px 16px; margin-bottom: 10px; }
#post-content tr:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
#post-content td { display: flex; justify-content: space-between; border: none !important; padding: 3px 0; font-size: 0.9em; line-height: 1.5; }
#post-content td:first-child { font-weight: 700; font-size: 1em; color: #333; padding-bottom: 4px; border-bottom: 1px solid #eee !important; margin-bottom: 4px; }
#post-content td::before { content: attr(data-label); font-weight: 600; color: #666; min-width: 60px; margin-right: 8px; flex-shrink: 0; font-size: 0.85em; }
#post-content blockquote { border-left: 3px solid #ddd; padding-left: 1em; color: #888; font-size: 0.78em; line-height: 1.6; }
#post-content blockquote p { margin: 0.2em 0; }
#post-content blockquote a { color: #999; text-decoration: none; }
#post-content blockquote ul { list-style: disc; padding-left: 1.5em; margin: 0.3em 0; }
#post-content blockquote li { padding: 2px 0; border: none !important; font-size: 0.95em; font-style: normal; }
#post-content blockquote li::before { content: "\00B7 "; color: #bbb; }
#post-content a { color: #2a7ae2; }
#post-content hr { border: none; border-top: 1px solid #eee; margin: 1.5em 0; }
.paywall-overlay { height: 120px; margin-top: -120px; position: relative; background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,1)); pointer-events: none; }
.paywall-box { text-align: center; padding: 30px 20px; border: 2px solid #e5e7eb; border-radius: 12px; background: #f9fafb; margin-top: 10px; }
.paywall-box h3 { font-size: 1.2em; margin-bottom: 10px; }
.paywall-box p { color: #666; font-size: 0.95em; line-height: 1.6; margin-bottom: 16px; }
.paywall-btn { display: inline-block; padding: 10px 28px; background: #2a7ae2; color: #fff !important; text-decoration: none !important; border-radius: 24px; font-size: 1em; font-weight: 600; transition: background 0.2s; }
.paywall-btn:hover { background: #1a5fb4; }
</style>
