<script>

    {

    {

      pain: isEn ? 'Paper attendance, manual billing' : '紙本點名、手動收費',
      competitors: '傑人校掌雲, 巧掌櫃',
      price: '$999/mo',
      opportunity: isEn ? 'High' : '高',
      color: '#8b5cf6'

    {

      title: isEn ? 'Fitness / Yoga' : '健身 / 瑜伽',

      competitors: '17FIT, ClassPass, Gymdesk',
      price: '$699/mo',
      opportunity: isEn ? 'Medium' : '中等',
      color: '#f59e0b'
    },
    {
      id: 'pet',
      icon: '🐾',
      title: isEn ? 'Pet Services' : '寵物服務',
      tam: '15,000+',
      desc: isEn ? 'Pet profiles, booking, photo gallery' : '寵物檔案、預約、作品集',
      pain: isEn ? 'No pet records, LINE-only booking' : '無寵物紀錄、僅 LINE 預約',
      competitors: 'PetBacker, Fluv',
      price: '$499/mo',
      opportunity: isEn ? 'Very High' : '極高',
      color: '#10b981'

    {
      id: 'clinic',

      color: '#78716c'

    var opportunityClass = '';

    else if (d.opportunity === 'Very High' || d.opportunity === '極高') opportunityClass = 'opp-very-high';
    else if (d.opportunity === 'High' || d.opportunity === '高') opportunityClass = 'opp-high';

    var card = document.createElement('a');
    card.href = '/demo-' + d.id;
    card.className = 'demo-card';
    card.style.borderTopColor = d.color;
    card.innerHTML =
      '<div class="demo-card-header">' +
        '<span class="demo-icon">' + d.icon + '</span>' +
        '<span class="demo-title">' + d.title + '</span>' +
      '</div>' +

      '<div class="demo-meta">' +

      '<div class="demo-opportunity ' + opportunityClass + '">' +

<style>
.demo-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 20px;
  margin-top: 16px;
}
.demo-card {
  display: block;
  border: 1px solid #e5e7eb;
  border-top: 4px solid #888;
  border-radius: 12px;
  padding: 20px;
  text-decoration: none !important;
  color: inherit !important;
  background: #fff;
  transition: all 0.2s;
  cursor: pointer;
}
.demo-card:hover {
  box-shadow: 0 4px 16px rgba(0,0,0,0.1);
  transform: translateY(-2px);
}
.demo-card-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 10px;
}
.demo-icon { font-size: 1.5em; }
.demo-title { font-size: 1.15em; font-weight: 700; color: #111; }
.demo-desc { font-size: 0.9em; color: #666; margin-bottom: 14px; line-height: 1.4; }
.demo-meta {
  font-size: 0.82em;
  border-top: 1px solid #f0f0f0;
  padding-top: 10px;
}
.demo-meta-row {
  display: flex;
  justify-content: space-between;
  padding: 3px 0;
}
.meta-label { color: #999; font-weight: 500; }
.meta-value { color: #333; text-align: right; max-width: 60%; }
.demo-opportunity {
  margin-top: 12px;
  padding: 6px 12px;
  border-radius: 8px;
  font-size: 0.82em;
  font-weight: 600;
  text-align: center;
  background: #f3f4f6;
  color: #666;
}
.opp-highest { background: #fef2f2; color: #dc2626; }
.opp-very-high { background: #f0fdf4; color: #16a34a; }
.opp-high { background: #eff6ff; color: #2563eb; }

@media (max-width: 600px) {
  .demo-grid { grid-template-columns: 1fr; }
}
</style>
