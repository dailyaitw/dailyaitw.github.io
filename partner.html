        <h3 id="card2-title"></h3>
        <p id="card2-desc"></p>
      </div>
      <div class="partner-card">
        <div class="partner-card-icon">🚀</div>
        <h3 id="card3-title"></h3>
        <p id="card3-desc"></p>
      </div>
      <div class="partner-card">
        <div class="partner-card-icon">💰</div>
        <h3 id="card4-title"></h3>
        <p id="card4-desc"></p>
      </div>
    </div>
    <div class="partner-pitch" id="partner-pitch"></div>
    <div class="partner-examples">
      <h3 id="examples-title"></h3>
      <div class="example-tags" id="example-tags"></div>
    </div>
  </details>

<script>
(function() {
  var lang = getLang();
  // Compact intro
  document.getElementById('partner-title').textContent = t(
    '🤝 尋找共同創辦人',
    '🤝 Find a Co-Founder'
  );
  document.getElementById('partner-desc').innerHTML = t(
    '你有領域知識和想法，我出技術和資金 — 不是外包，是<strong>一起創業、一起經營</strong>。',
    'You bring domain knowledge & ideas, I bring tech & funding — not outsourcing, <strong>co-founding together</strong>.'
  );

  // Highlight pills
  document.getElementById('hl1').textContent = t('💡 你出想法', '💡 You bring ideas');
  document.getElementById('hl2').textContent = t('🛠️ 我出技術和資金', '🛠️ I bring tech & funding');
  document.getElementById('hl3').textContent = t('🚀 一起經營分享成果', '🚀 Co-operate & share outcomes');

  // Details toggle
  document.getElementById('details-summary').textContent = t('了解更多細節 ▸', 'Learn more details ▸');

  // Cards
  document.getElementById('card1-title').textContent = t('你出想法和領域', 'You Bring the Vision');
  document.getElementById('card1-desc').textContent = t(
    '你最了解自己的領域 — 痛點、需求、機會，這些就是最大的價值',
    'You know your field best — the pain points, needs, and opportunities are the real value'
  );
  document.getElementById('card2-title').textContent = t('我出技術和資金', 'I Bring Tech & Funding');
  document.getElementById('card2-desc').textContent = t(
    '你不必出任何資金，不必學任何 IT 或 AI — 技術面全部由我承擔',
    'You invest zero money, learn zero IT/AI — I handle the entire technical side'
  );
  document.getElementById('card3-title').textContent = t('一起經營', 'Co-Operate Together');
  document.getElementById('card3-desc').textContent = t(
    '不是幫你做完就走 — 是一起經營、一起成長，合作模式可以談',
    'Not build-and-leave — we run it together, grow together. Terms are negotiable'
  );
  document.getElementById('card4-title').textContent = t('2026 一起創造營收', '2026 Revenue Together');
  document.getElementById('card4-desc').textContent = t(
    '能成為商業機會最好，不行就當做練習和情懷。簡單目的：2026 年一起有成果',
    'Commercial success is ideal; if not, it\'s still a great experience. Simple goal: results in 2026'
  );

  // Pitch quote
  document.getElementById('partner-pitch').innerHTML = t(
    '<p>「我在製造業待了很多年，看過太多有能力的人因為不懂技術而錯過機會。現在 AI 時代，<strong>高齡族群</strong>和<strong>職場媽媽</strong>都有全新的可能。你有想法和經驗，我有技術和資源 — 我們不是甲方乙方，是<strong>合夥人</strong>。合作條件都可以談，重點是一起把事情做出來。」</p><p class="pitch-author">— Mark，馬克路思科技創辦人</p>',
    '<p>"After years in manufacturing, I\'ve seen too many capable people miss opportunities because they lacked technical skills. In the AI era, <strong>older professionals</strong> and <strong>working parents</strong> have brand new possibilities. You have the ideas and experience, I have the tech and resources — we\'re not client and vendor, we\'re <strong>partners</strong>. Terms are open for discussion. What matters is building something together."</p><p class="pitch-author">— Mark, Founder of Markroots Technology</p>'
  );

  // Example domains
  document.getElementById('examples-title').textContent = t('適合的構想方向（不限於此）', 'Example Ideas (Not Limited To)');
  var examples = lang === 'en' ? [
    'Working parents platform', 'Industry-specific tools', 'Local community services',
    'Education & training', 'Health & wellness', 'Small business solutions',
    'Freelancer marketplace', 'Senior lifestyle', 'Hobby communities', 'Your own idea!'
  ] : [
    '寶媽職場平台', '特定產業工具', '在地社區服務',
    '教育培訓', '健康生活', '中小企業方案',
    '自由工作者媒合', '銀髮族生活', '興趣社群', '你的構想！'
  ];
  document.getElementById('example-tags').innerHTML = examples.map(function(e) {
    return '<span class="example-tag">' + e + '</span>';
  }).join('');

  // Login prompt
  document.getElementById('login-prompt-text').textContent = t(
    '請先登入，即可與 AI 助理聊聊你的構想',
    'Please log in to chat with our AI assistant about your idea'
  );
  document.getElementById('login-prompt-btn').textContent = t('登入 / 註冊', 'Login / Sign Up');

  // Chat section
  document.getElementById('chat-title').textContent = t('💬 與 AI 助理聊聊你的構想', '💬 Chat About Your Idea');
  document.getElementById('chat-input').placeholder = t(
    '描述你的網站構想，例如：我在餐飲業工作，想做一個...',
    'Describe your website idea, e.g.: I work in hospitality and want to build a...'
  );
  document.getElementById('chat-send').textContent = t('送出', 'Send');
  document.getElementById('chat-hint').textContent = t(
    '我們的 AI 助理會和你聊聊構想的方向與可行性。Mark 會親自審閱每段對話。',
    'Our AI assistant will discuss your idea at a conceptual level. Mark will personally review every conversation.'
  );
})();

// ---- Auth check ----
var _sbClient = window.supabase.createClient(window.DAILYAI_SB_URL, window.DAILYAI_SB_KEY);
var _chatId = null;
var _messages = [];
var _sending = false;
var _accessToken = null;

(async function() {
  // Use Supabase client to get fresh session (auto-refreshes expired tokens)
  var { data: { session } } = await _sbClient.auth.getSession();
  if (!session || !session.user) {
    document.getElementById('login-prompt').style.display = 'block';
    return;
  }
  _accessToken = session.access_token;
  document.getElementById('chat-section').style.display = 'block';
  document.getElementById('chat-status').textContent = t('已登入', 'Logged in');

  // Load existing chat or start new
  await loadChat(session.user.id, session.user.email);
})();

async function loadChat(userId, email) {
  try {
    var res = await fetch(window.DAILYAI_SB_URL + '/rest/v1/partner_chats?user_id=eq.' + userId + '&order=created_at.desc&limit=1', {
      headers: { 'apikey': window.DAILYAI_SB_KEY, 'Authorization': 'Bearer ' + window.DAILYAI_SB_KEY }
    });
    var data = await res.json();
    if (data && data.length > 0) {
      _chatId = data[0].id;
      _messages = data[0].messages || [];
    }
  } catch(e) { console.error('Load chat error:', e); }

  if (_messages.length === 0) {
    // Add welcome message
    var welcome = t(
      '你好！我是 Daily AI Taiwan 的合作夥伴招募助理。\n\nMark 掌握了最新 AI 開發能力，正在找合作夥伴。你不必出任何資金，也不必學任何 IT 或 AI — 只需要帶著你熟悉領域的想法。\n\n我會用幾個簡單的問題來了解你的構想。\n\n首先 — 你目前在什麼領域工作，或是生活中最熟悉什麼？',
      'Hi! I\'m the partner recruitment assistant for Daily AI Taiwan.\n\nMark has AI & development expertise and is looking for partners with real-world ideas. You don\'t need any money or tech skills — just your domain knowledge.\n\nLet me walk you through a few quick questions to understand your idea.\n\nFirst — what\'s your background? What field do you work in, or what area of life are you most familiar with?'
    );
    _messages.push({ role: 'assistant', content: welcome, time: new Date().toISOString() });
  }
  renderMessages();
}

function renderMessages() {
  var container = document.getElementById('chat-messages');
  container.innerHTML = '';
  _messages.forEach(function(msg) {
    var bubble = document.createElement('div');
    bubble.className = 'chat-bubble chat-' + msg.role;
    var text = document.createElement('div');
    text.className = 'chat-text';
    text.textContent = msg.content;
    bubble.appendChild(text);
    var time = document.createElement('div');
    time.className = 'chat-time';
    time.textContent = msg.time ? new Date(msg.time).toLocaleString() : '';
    bubble.appendChild(time);
    container.appendChild(bubble);
  });
  container.scrollTop = container.scrollHeight;
}

async function sendMessage() {
  if (_sending) return;
  var input = document.getElementById('chat-input');
  var text = input.value.trim();
  if (!text) return;

  _sending = true;
  var btn = document.getElementById('chat-send');
  btn.disabled = true;
  btn.textContent = t('思考中...', 'Thinking...');

  // Add user message
  _messages.push({ role: 'user', content: text, time: new Date().toISOString() });
  input.value = '';
  renderMessages();

  try {
    // Refresh token if needed
    var { data: { session: freshSession } } = await _sbClient.auth.getSession();
    if (freshSession) _accessToken = freshSession.access_token;

    var res = await fetch(window.DAILYAI_SB_URL + '/functions/v1/chat-partner', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + _accessToken,
        'apikey': window.DAILYAI_SB_KEY
      },
      body: JSON.stringify({
        message: text,
        chat_id: _chatId,
        history: _messages.slice(-10),  // last 10 messages for context
        lang: getLang()
      })
    });

    if (!res.ok) {
      var errText = await res.text();
      throw new Error(errText || 'Request failed');
    }

    var result = await res.json();
    _chatId = result.chat_id;
    _messages.push({ role: 'assistant', content: result.reply, time: new Date().toISOString() });
  } catch(e) {
    console.error('Chat error:', e);
    _messages.push({
      role: 'assistant',
      content: t(
        '抱歉，目前無法回應。請稍後再試，或直接寄信到 ai@dailyai.tw 告訴我們你的想法！',
        'Sorry, I\'m unable to respond right now. Please try again later, or email ai@dailyai.tw with your idea!'
      ),
      time: new Date().toISOString()
    });
  }

  renderMessages();
  btn.disabled = false;
  btn.textContent = t('送出', 'Send');
  _sending = false;
}

// Enter key to send
document.getElementById('chat-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});
</script>
