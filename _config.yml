title: Daily AI Taiwan — 立足台灣，讀懂 AI
description: "立足台灣，用繁體中文帶你每日讀懂 AI 的下一步"
baseurl: ""
url: "https://dailyai.tw"
theme: minima
markdown: kramdown
encoding: utf-8

header_pages: []

plugins:
  - jekyll-sitemap
  - jekyll-seo-tag
  - jekyll-feed

defaults:
  - scope:
      path: "posts"
    values:
      sitemap: false
      published: false
  - scope:
      path: "admin.html"
    values:
      sitemap: false

exclude:
  - scripts
  - node_modules

include:
  - _redirects
  - _headers
