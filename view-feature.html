---
layout: default
title: Daily AI Taiwan — 精選專題
sitemap: false
---

<div id="feature-app">
  <div id="feature-loading" style="text-align:center; padding:40px; color:#888;">載入中...</div>
  <div id="feature-content" style="display:none;"></div>
  <div id="feature-not-found" style="display:none; text-align:center; padding:40px;">
    <h2>找不到這篇文章</h2>
    <p style="color:#888;">請確認網址是否正確。</p>
    <a href="/" style="color:#2a7ae2;">← 回首頁</a>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
(function() {
  var SB_URL = window.DAILYAI_SB_URL;
  var SB_KEY = window.DAILYAI_SB_KEY;

  // Access controlled by is_free field in DB
  // Read from URL params: /view-feature?slug=2026-03/ai-transforming-social-media
  var params = new URLSearchParams(window.location.search);
  var slug = params.get('slug');

  if (!slug) { window.location.href = '/'; return; }

  var query = 'type=eq.feature&slug=eq.' + encodeURIComponent(slug) + '&select=*';

  fetch(SB_URL + '/rest/v1/posts?' + query, {
    headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY }
  })
  .then(function(res) { return res.json(); })
  .then(function(data) {
    document.getElementById('feature-loading').style.display = 'none';

    if (data.length === 0) {
      document.getElementById('feature-not-found').style.display = 'block';
      return;
    }

    var post = data[0];
    document.title = post.title + ' — Daily AI Taiwan';

    var isLoggedIn = false;
    try {
      var stored = localStorage.getItem('sb-kszbdgfbihnawjgmwjlk-auth-token');
      if (stored) { var sess = JSON.parse(stored); if (sess && sess.user) isLoggedIn = true; }
    } catch(e) {}

    var fullContent = marked.parse(post.content);

    var pageUrl = encodeURIComponent(window.location.pathname + window.location.search);
    var pageTitle = encodeURIComponent(post.title + ' — Daily AI Taiwan');
    var pageSummary = encodeURIComponent(post.summary || '');

    // Update OG meta tags for social sharing
    document.title = post.title + ' — Daily AI Taiwan';
    var ogTags = { 'og:title': post.title, 'og:description': post.summary || '', 'og:url': window.location.href, 'og:type': 'article', 'og:site_name': 'Daily AI Taiwan' };
    Object.keys(ogTags).forEach(function(prop) {
      var el = document.querySelector('meta[property="' + prop + '"]');
      if (el) { el.setAttribute('content', ogTags[prop]); }
      else { var m = document.createElement('meta'); m.setAttribute('property', prop); m.setAttribute('content', ogTags[prop]); document.head.appendChild(m); }
    });
    var descEl = document.querySelector('meta[name="description"]');
    if (descEl) descEl.setAttribute('content', post.summary || '');

    // Use Facebook Feed dialog for better preview (passes title + description)
    var fbShareUrl = 'https://www.facebook.com/sharer/sharer.php?u=' + pageUrl + '&quote=' + pageTitle;
    var shareBar = '<div class="share-bar">' +
      '<a href="' + fbShareUrl + '" target="_blank" rel="noopener" class="share-icon share-fb" title="分享到 Facebook"><svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg></a>' +
      '</div>';

    var html = '<div style="margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;">' +
      '<div>' +
      '<a href="/" style="color:#2a7ae2;text-decoration:none;font-size:0.9em;">← 回首頁</a>' +
      ' <span style="color:#ddd;margin:0 8px;">|</span> ' +
      '<span style="display:inline-block;background:#ef4444;color:#fff;font-size:0.7em;padding:2px 10px;border-radius:12px;font-weight:600;vertical-align:middle;">專題</span>' +
      '</div>' + shareBar +
      '</div>';

    var isPublic = post.is_free === true;

    if (!isLoggedIn && !isPublic) {
      var tmp = document.createElement('div');
      tmp.innerHTML = fullContent;
      var els = tmp.querySelectorAll('h1,h2,h3,p,ul,ol,table,blockquote,hr');
      var show = Math.max(5, Math.floor(els.length * 0.25));
      var preview = '';
      for (var i = 0; i < Math.min(show, els.length); i++) preview += els[i].outerHTML;
      html += preview;
      html += '<div class="paywall-overlay"></div>';
      html += '<div class="paywall-box">';
      html += '<h3>🔒 註冊免費閱讀完整專題</h3>';
      html += '<p>精選專題需要登入才能閱讀完整內容。<br>免費註冊即可解鎖！</p>';
      html += '<a href="/login?redirect=' + encodeURIComponent(window.location.pathname + window.location.search) + '" class="paywall-btn">免費註冊 / 登入</a>';
      html += '<p style="font-size:0.8em;color:#999;margin-top:12px;">支援 Email、Google、GitHub、Discord 登入</p>';
      html += '</div>';
    } else {
      html += fullContent;
      html += '<div class="share-bottom">' + shareBar + '</div>';
      if (isPublic && !isLoggedIn) {
        html += '<div class="public-cta">';
        html += '<p>💡 喜歡這篇文章？<a href="/login?redirect=' + encodeURIComponent(window.location.pathname + window.location.search) + '">免費註冊</a>解鎖更多精選專題！</p>';
        html += '</div>';
      }
    }

    var el = document.getElementById('feature-content');
    el.innerHTML = html;
    el.style.display = 'block';

    el.querySelectorAll('table').forEach(function(table) {
      var headers = [];
      table.querySelectorAll('thead th').forEach(function(th) { headers.push(th.textContent.trim()); });
      if (headers.length === 0) return;
      table.querySelectorAll('tbody tr').forEach(function(tr) {
        tr.querySelectorAll('td').forEach(function(td, i) {
          if (headers[i]) td.setAttribute('data-label', headers[i]);
        });
      });
    });

    fetch(SB_URL + '/rest/v1/post_views', {
      method: 'POST',
      headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
      body: JSON.stringify({ post_date: post.date, post_type: 'feature' })
    }).catch(function(){});
  })
  .catch(function() {
    document.getElementById('feature-loading').style.display = 'none';
    document.getElementById('feature-not-found').style.display = 'block';
  });
})();
</script>

<style>
#feature-content { line-height: 1.8; max-width: 800px; margin: 0 auto; }
#feature-content h1 { font-size: 1.6em; line-height: 1.3; margin-bottom: 0.5em; }
#feature-content h2 { font-size: 1.3em; margin-top: 2em; padding-bottom: 0.3em; border-bottom: 1px solid #eee; }
#feature-content h3 { font-size: 1.1em; margin-top: 1.5em; }
#feature-content p { margin: 0.8em 0; }
#feature-content table { width: 100%; border: none !important; border-collapse: separate; border-spacing: 0 12px; margin: 1em 0; font-size: 0.9em; }
#feature-content thead { display: none; }
#feature-content tbody { display: block; }
#feature-content tr { display: block; background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 10px; padding: 14px 16px; margin-bottom: 10px; }

#feature-content td::before { content: attr(data-label); font-weight: 600; color: #666; min-width: 60px; margin-right: 8px; flex-shrink: 0; font-size: 0.85em; }
#feature-content blockquote { border-left: 3px solid #2a7ae2; padding: 12px 16px; background: #f8f9fa; border-radius: 0 8px 8px 0; color: #444; font-size: 1em; margin: 1.5em 0; }
#feature-content blockquote:last-child { border-left: none; font-size: 0.85em; color: #666; background: transparent; font-style: normal; }
#feature-content blockquote p { margin: 0.3em 0; }
#feature-content blockquote a { color: #999; text-decoration: none; }
#feature-content blockquote ul { list-style: none; padding-left: 0; margin: 0.3em 0; }
#feature-content blockquote li { padding: 2px 0; border: none !important; font-size: 0.95em; font-style: normal; }
#feature-content a { color: #2a7ae2; }
#feature-content hr { border: none; border-top: 1px solid #eee; margin: 2em 0; }
.paywall-overlay { height: 120px; margin-top: -120px; position: relative; background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,1)); pointer-events: none; }
.paywall-box { text-align: center; padding: 30px 20px; border: 2px solid #e5e7eb; border-radius: 12px; background: #f9fafb; margin-top: 10px; }
.paywall-box h3 { font-size: 1.2em; margin-bottom: 10px; }
.paywall-box p { color: #666; font-size: 0.95em; line-height: 1.6; margin-bottom: 16px; }
.paywall-btn { display: inline-block; padding: 10px 28px; background: #2a7ae2; color: #fff !important; text-decoration: none !important; border-radius: 24px; font-size: 1em; font-weight: 600; }
.paywall-btn:hover { background: #1a5fb4; }
.public-cta { text-align: center; padding: 20px; margin-top: 24px; border-top: 1px solid #eee; color: #666; font-size: 0.95em; }
.public-cta a { color: #2a7ae2; font-weight: 600; }
.share-bar { display: flex; align-items: center; gap: 8px; }
.share-label { font-size: 0.8em; color: #999; }
.share-icon { display: inline-flex; align-items: center; justify-content: center; width: 34px; height: 34px; border-radius: 50%; border: 1px solid #e5e7eb; background: #fff; color: #666; text-decoration: none !important; cursor: pointer; transition: all 0.2s; }
.share-icon:hover { transform: translateY(-2px); box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
.share-fb:hover { color: #1877f2; border-color: #1877f2; }
.share-bottom { display: flex; justify-content: center; padding: 20px 0; margin-top: 16px; border-top: 1px solid #eee; }
</style>
