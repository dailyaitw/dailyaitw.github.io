<script>
const SB_URL = 'https://kszbdgfbihnawjgmwjlk.supabase.co';
const SB_KEY = 'sb_publishable_VrgzauRQ_kV_2MD0ujZ39w_0KREni_f';
const ADMIN_GITHUB = 'dailyaitw';

// For admin, we use secret key to read all data
async function apiFetch(table, query) {
  const res = await fetch(SB_URL + '/rest/v1/' + table + '?' + query, {
    headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY }
  });
  return res.json();
}

async function checkAdmin() {
  // Check if user is logged in via Supabase auth
  const sb = window.supabase ? window.supabase.createClient(SB_URL, 'sb_publishable_VrgzauRQ_kV_2MD0ujZ39w_0KREni_f') : null;

  // Simple approach: check URL hash for admin token or use hardcoded check
  const urlParams = new URLSearchParams(window.location.search);
  const adminKey = urlParams.get('key');

  // Allow access with secret key in URL or if GitHub dailyaitw is logged in
  if (adminKey === 'dailyaitw2026') {
    return true;
  }

  // Check Supabase auth
  if (sb) {
    const { data: { session } } = await sb.auth.getSession();
    if (session && session.user) {
      const meta = session.user.user_metadata || {};
      if (meta.user_name === ADMIN_GITHUB || meta.preferred_username === ADMIN_GITHUB) {
        return true;
      }
    }
  }

  return false;
}

async function loadDashboard() {
  const isAdmin = await checkAdmin();

  if (!isAdmin) {
    // Show login or denied
    document.getElementById('admin-login').style.display = 'block';
    return;
  }

  document.getElementById('admin-dashboard').style.display = 'block';
  document.getElementById('admin-user').textContent = 'Logged in as admin';

  // Load stats
  const visits = await apiFetch('visit_logs', 'select=*&order=created_at.desc&limit=500');
  const today = new Date().toISOString().split('T')[0];

  // Summary stats
  document.getElementById('stat-total').textContent = visits.length + (visits.length >= 500 ? '+' : '');
  document.getElementById('stat-today').textContent = visits.filter(v => v.created_at && v.created_at.startsWith(today)).length;
  document.getElementById('stat-unique').textContent = new Set(visits.map(v => v.visitor_ip).filter(Boolean)).size;
  document.getElementById('stat-auth').textContent = visits.filter(v => v.is_authenticated).length;

  // Device distribution
  const devices = {};
  visits.forEach(v => { devices[v.device_type || 'unknown'] = (devices[v.device_type || 'unknown'] || 0) + 1; });
  document.getElementById('device-stats').innerHTML = makeBarChart(devices);

  // Browser distribution
  const browsers = {};
  visits.forEach(v => { browsers[v.browser || 'unknown'] = (browsers[v.browser || 'unknown'] || 0) + 1; });
  document.getElementById('browser-stats').innerHTML = makeBarChart(browsers);

  // Country distribution
  const countries = {};
  visits.forEach(v => { countries[v.country || 'unknown'] = (countries[v.country || 'unknown'] || 0) + 1; });
  document.getElementById('country-stats').innerHTML = makeBarChart(countries);

  // Page distribution
  const pages = {};
  visits.forEach(v => { pages[v.page_url || '/'] = (pages[v.page_url || '/'] || 0) + 1; });
  document.getElementById('page-stats').innerHTML = makeBarChart(pages);

  // Recent visits table
  const tbody = document.getElementById('visits-body');
  tbody.innerHTML = visits.slice(0, 50).map(v => {
    const time = v.created_at ? new Date(v.created_at).toLocaleString('zh-TW') : '-';
    return '<tr>' +
      '<td>' + time + '</td>' +
      '<td>' + (v.visitor_ip || '-') + '</td>' +
      '<td>' + (v.user_email || '<span style="color:#999">Guest</span>') + '</td>' +
      '<td>' + (v.page_url || '/') + '</td>' +
      '<td>' + (v.device_type || '-') + '</td>' +
      '<td>' + (v.browser || '-') + '</td>' +
      '<td>' + (v.country || '-') + '</td>' +
      '<td>' + (v.city || '-') + '</td>' +
      '</tr>';
  }).join('');

  // Load contacts
  const contacts = await apiFetch('contacts', 'select=*&order=created_at.desc');
  const contactsEl = document.getElementById('contacts-list');
  if (contacts.length === 0) {
    contactsEl.innerHTML = '<p style="color:#999;">尚無聯繫訊息</p>';
  } else {
    contactsEl.innerHTML = contacts.map(c => {
      const time = c.created_at ? new Date(c.created_at).toLocaleString('zh-TW') : '-';
      return '<div class="contact-card">' +
        '<div class="contact-header"><strong>' + (c.name || 'Anonymous') + '</strong> &lt;' + c.email + '&gt; <span style="color:#999;font-size:12px;">' + time + '</span></div>' +
        '<div class="contact-body">' + (c.message || '').replace(/\n/g, '<br>') + '</div>' +
        '</div>';
    }).join('');
  }
}

function makeBarChart(data) {
  const sorted = Object.entries(data).sort((a, b) => b[1] - a[1]);
  const max = sorted[0] ? sorted[0][1] : 1;
  return '<div class="bar-chart">' + sorted.map(([label, count]) => {
    const pct = Math.round(count / max * 100);
    return '<div class="bar-row"><span class="bar-label">' + label + '</span>' +
      '<div class="bar-track"><div class="bar-fill" style="width:' + pct + '%"></div></div>' +
      '<span class="bar-count">' + count + '</span></div>';
  }).join('') + '</div>';
}

function loginGitHub() {
  // Redirect to admin with key for now
  // In production, use Supabase GitHub OAuth
  window.location.href = '/admin?key=dailyaitw2026';
}

loadDashboard();
</script>

.bar-track { flex: 1; background: #eee; border-radius: 4px; height: 20px; }
.bar-fill { background: #2a7ae2; border-radius: 4px; height: 100%; min-width: 2px; }

#visits-table tr:hover { background: #f9f9f9; }
.contact-card { border: 1px solid #eee; border-radius: 8px; padding: 12px; margin: 10px 0; }
.contact-header { margin-bottom: 8px; }
.contact-body { color: #555; font-size: 14px; line-height: 1.6; }
</style>
