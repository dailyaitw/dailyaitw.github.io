---
layout: default
title: Admin Dashboard
---

<style>
  .page-content .wrapper { max-width: 100%; padding: 0 20px; }
</style>

<div id="admin-app">
  <div id="admin-login" style="display:none; text-align:center; padding:40px;">
    <h2>🔒 管理員登入</h2>
    <p>請使用 GitHub (dailyaitw) 或管理員帳號登入</p>
    <div style="display:flex; flex-direction:column; gap:10px; max-width:280px; margin:20px auto;">
      <button onclick="adminLogin('github')" style="padding:12px 24px; background:#333; color:#fff; border:none; border-radius:6px; font-size:15px; cursor:pointer;">
        GitHub 登入
      </button>
      <button onclick="adminLogin('google')" style="padding:12px 24px; background:#4285F4; color:#fff; border:none; border-radius:6px; font-size:15px; cursor:pointer;">
        Google 登入
      </button>
    </div>
  </div>

  <div id="admin-denied" style="display:none; text-align:center; padding:40px;">
    <h2>⛔ 存取被拒</h2>
    <p id="denied-msg">只有管理員帳號可以存取此頁面。</p>
    <button onclick="window.location.href='/'" style="padding:8px 16px; cursor:pointer;">回首頁</button>
  </div>

  <div id="admin-dashboard" style="display:none;">
    <h1>📊 Admin Dashboard</h1>
    <p id="admin-user" style="color:#888;"></p>

    <hr>

    <h2>📈 訪客統計</h2>
    <div id="stats-summary" style="display:flex; gap:20px; flex-wrap:wrap; margin:20px 0;">
      <div class="stat-card"><div class="stat-num" id="stat-total">-</div><div class="stat-label">總訪問次數</div></div>
      <div class="stat-card"><div class="stat-num" id="stat-today">-</div><div class="stat-label">今日訪問</div></div>
      <div class="stat-card"><div class="stat-num" id="stat-unique">-</div><div class="stat-label">獨立訪客（IP）</div></div>
      <div class="stat-card stat-clickable" onclick="toggleAuthUsers()"><div class="stat-num" id="stat-auth">-</div><div class="stat-label">已登入用戶 ▼</div></div>
    </div>

    <div id="auth-users-panel" style="display:none; margin-bottom:20px;">
      <h3>👤 已登入用戶列表</h3>
      <div id="auth-users-list"></div>
      <div id="auth-users-pagination" style="text-align:center; margin-top:10px;"></div>
    </div>

    <h3>📱 裝置分佈</h3>
    <div id="device-stats"></div>

    <h3>🌐 瀏覽器分佈</h3>
    <div id="browser-stats"></div>

    <h3>🌍 國家/地區分佈</h3>
    <div id="country-stats"></div>

    <h3>📄 熱門頁面</h3>
    <div id="page-stats"></div>

    <hr>

    <h2>📖 內容分析</h2>
    <div style="display:flex; gap:10px; margin-bottom:10px; flex-wrap:wrap;">
      <button class="pag-btn pag-active" id="cv-btn-daily" onclick="showContentView('daily')">📅 日報</button>
      <button class="pag-btn" id="cv-btn-monthly" onclick="showContentView('monthly')">📊 月度</button>
      <button class="pag-btn" id="cv-btn-yearly" onclick="showContentView('yearly')">📚 年度</button>
      <button class="pag-btn" id="cv-btn-feature" onclick="showContentView('feature')">🔥 專題</button>
    </div>
    <div id="content-views-list"></div>

    <hr>

    <h2>📬 聯繫訊息</h2>
    <div id="contacts-list"><p>載入中...</p></div>

    <hr>

    <h2>📝 最近訪客記錄（最新 50 筆）</h2>
    <div style="overflow-x:auto;">
      <table id="visits-table">
        <thead>
          <tr><th>時間</th><th>IP</th><th>Email</th><th>頁面</th><th>裝置</th><th>瀏覽器</th><th>國家</th><th>城市</th></tr>
        </thead>
        <tbody id="visits-body"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
const SB_URL = 'https://kszbdgfbihnawjgmwjlk.supabase.co';
const SB_KEY = 'sb_publishable_VrgzauRQ_kV_2MD0ujZ39w_0KREni_f';
const ADMIN_GITHUB = 'dailyaitw';
const ADMIN_EMAILS = ['ai@dailyai.tw', 'markluceai@gmail.com'];

var _sb;
function getSB() {
  if (!_sb && window.supabase) _sb = window.supabase.createClient(SB_URL, SB_KEY);
  return _sb;
}

async function apiFetch(table, query) {
  const res = await fetch(SB_URL + '/rest/v1/' + table + '?' + query, {
    headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY }
  });
  return res.json();
}

async function checkAdmin() {
  try {
    var sb = getSB();
    if (!sb) return false;
    var { data } = await sb.auth.getSession();
    if (data && data.session && data.session.user) {
      var user = data.session.user;
      var meta = user.user_metadata || {};
      var ghUser = meta.user_name || meta.preferred_username || '';
      var email = user.email || meta.email || '';
      var name = meta.full_name || meta.name || ghUser || email;

      if (ghUser === ADMIN_GITHUB || ADMIN_EMAILS.includes(email)) {
        return { user: name, email: email };
      }
      return { denied: true, user: name, email: email };
    }
  } catch(e) {
    console.error('Auth check error:', e);
  }
  return false;
}

async function adminLogin(provider) {
  try {
    var sb = getSB();
    await sb.auth.signInWithOAuth({
      provider: provider,
      options: { redirectTo: window.location.origin + '/admin' }
    });
  } catch(e) {
    alert('登入失敗，請稍後再試');
  }
}

async function loadDashboard() {
  var result = await checkAdmin();

  if (!result) {
    document.getElementById('admin-login').style.display = 'block';
    return;
  }

  if (result.denied) {
    document.getElementById('admin-denied').style.display = 'block';
    document.getElementById('denied-msg').textContent = result.email + ' 不是管理員帳號。';
    return;
  }

  document.getElementById('admin-dashboard').style.display = 'block';
  document.getElementById('admin-user').textContent = '已登入：' + result.user + ' (' + result.email + ')';

  // Load stats
  var visits = await apiFetch('visit_logs', 'select=*&order=created_at.desc&limit=500');
  var today = new Date().toISOString().split('T')[0];

  document.getElementById('stat-total').textContent = visits.length + (visits.length >= 500 ? '+' : '');
  document.getElementById('stat-today').textContent = visits.filter(function(v) { return v.created_at && v.created_at.startsWith(today); }).length;
  document.getElementById('stat-unique').textContent = new Set(visits.map(function(v) { return v.visitor_ip; }).filter(Boolean)).size;
  var authVisits = visits.filter(function(v) { return v.is_authenticated; });
  var uniqueAuthUsers = new Set(authVisits.map(function(v) { return v.user_email || v.user_id; }).filter(Boolean)).size;
  document.getElementById('stat-auth').textContent = uniqueAuthUsers;

  // Build auth users data
  // Also fetch users from Supabase auth
  var authUsers = [];
  try {
    var usersRes = await fetch(SB_URL + '/auth/v1/admin/users?per_page=500', {
      headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY }
    });
    if (usersRes.ok) {
      var usersData = await usersRes.json();
      authUsers = usersData.users || [];
    }
  } catch(e) {}

  // Build provider lookup from auth users
  var providerMap = {};
  authUsers.forEach(function(u) {
    var provider = 'email';
    if (u.app_metadata && u.app_metadata.provider) provider = u.app_metadata.provider;
    providerMap[u.email] = provider;
  });

  var userMap = {};
  authVisits.forEach(function(v) {
    var key = v.user_email || v.user_id || 'unknown';
    if (!userMap[key]) {
      userMap[key] = { email: key, first: v.created_at, last: v.created_at, count: 0, provider: providerMap[key] || '—' };
    }
    userMap[key].count++;
    if (v.created_at < userMap[key].first) userMap[key].first = v.created_at;
    if (v.created_at > userMap[key].last) userMap[key].last = v.created_at;
  });
  window._authUsers = Object.values(userMap).sort(function(a, b) { return b.count - a.count; });

  var devices = {}, browsers = {}, countries = {}, pages = {};
  visits.forEach(function(v) {
    devices[v.device_type || 'unknown'] = (devices[v.device_type || 'unknown'] || 0) + 1;
    browsers[v.browser || 'unknown'] = (browsers[v.browser || 'unknown'] || 0) + 1;
    countries[v.country || 'unknown'] = (countries[v.country || 'unknown'] || 0) + 1;
    pages[v.page_url || '/'] = (pages[v.page_url || '/'] || 0) + 1;
  });
  document.getElementById('device-stats').innerHTML = makeBarChart(devices);
  document.getElementById('browser-stats').innerHTML = makeBarChart(browsers);
  document.getElementById('country-stats').innerHTML = makeBarChart(countries);
  document.getElementById('page-stats').innerHTML = makeBarChart(pages);

  // Visits table
  document.getElementById('visits-body').innerHTML = visits.slice(0, 50).map(function(v) {
    var time = v.created_at ? new Date(v.created_at).toLocaleString('zh-TW') : '-';
    return '<tr><td>' + time + '</td><td>' + (v.visitor_ip || '-') + '</td><td>' +
      (v.user_email || '<span style="color:#999">Guest</span>') + '</td><td>' +
      (v.page_url || '/') + '</td><td>' + (v.device_type || '-') + '</td><td>' +
      (v.browser || '-') + '</td><td>' + (v.country || '-') + '</td><td>' +
      (v.city || '-') + '</td></tr>';
  }).join('');

  // Contacts
  var contacts = await apiFetch('contacts', 'select=*&order=created_at.desc');
  var contactsEl = document.getElementById('contacts-list');
  if (contacts.length === 0) {
    contactsEl.innerHTML = '<p style="color:#999;">尚無聯繫訊息</p>';
  } else {
    contactsEl.innerHTML = contacts.map(function(c) {
      var time = c.created_at ? new Date(c.created_at).toLocaleString('zh-TW') : '-';
      return '<div class="contact-card"><div class="contact-header"><strong>' +
        (c.name || 'Anonymous') + '</strong> &lt;' + c.email + '&gt; <span style="color:#999;font-size:12px;">' +
        time + '</span></div><div class="contact-body">' +
        (c.message || '').replace(/\n/g, '<br>') + '</div></div>';
    }).join('');
  }
}

function makeBarChart(data) {
  var sorted = Object.entries(data).sort(function(a, b) { return b[1] - a[1]; });
  var max = sorted[0] ? sorted[0][1] : 1;
  return '<div class="bar-chart">' + sorted.map(function(item) {
    var pct = Math.round(item[1] / max * 100);
    return '<div class="bar-row"><span class="bar-label">' + item[0] + '</span>' +
      '<div class="bar-track"><div class="bar-fill" style="width:' + pct + '%"></div></div>' +
      '<span class="bar-count">' + item[1] + '</span></div>';
  }).join('') + '</div>';
}

var _authPage = 1;
var _authPerPage = 10;

function toggleAuthUsers() {
  var panel = document.getElementById('auth-users-panel');
  if (panel.style.display === 'none') {
    panel.style.display = 'block';
    renderAuthUsers(1);
  } else {
    panel.style.display = 'none';
  }
}

function renderAuthUsers(page) {
  _authPage = page;
  var users = window._authUsers || [];
  var total = users.length;
  var totalPages = Math.ceil(total / _authPerPage);
  var start = (page - 1) * _authPerPage;
  var slice = users.slice(start, start + _authPerPage);

  var providerBadge = function(p) {
    var colors = { email: '#6b7280', google: '#ea4335', github: '#333', discord: '#5865f2' };
    var c = colors[p] || '#999';
    return '<span style="background:' + c + ';color:#fff;padding:2px 8px;border-radius:10px;font-size:11px;">' + p + '</span>';
  };

  var html = '<table class="auth-users-table"><thead><tr>' +
    '<th>#</th><th>Email</th><th>登入方式</th><th>訪問次數</th><th>首次訪問</th><th>最近訪問</th></tr></thead><tbody>';
  slice.forEach(function(u, i) {
    var first = u.first ? new Date(u.first).toLocaleString('zh-TW') : '-';
    var last = u.last ? new Date(u.last).toLocaleString('zh-TW') : '-';
    html += '<tr><td>' + (start + i + 1) + '</td><td>' + u.email +
      '</td><td>' + providerBadge(u.provider) + '</td><td><strong>' + u.count + '</strong></td><td>' + first + '</td><td>' + last + '</td></tr>';
  });
  html += '</tbody></table>';
  document.getElementById('auth-users-list').innerHTML = html;

  // Pagination
  if (totalPages > 1) {
    var pag = '';
    for (var p = 1; p <= totalPages; p++) {
      pag += '<button onclick="renderAuthUsers(' + p + ')" class="pag-btn' + (p === page ? ' pag-active' : '') + '">' + p + '</button> ';
    }
    pag = '<span style="color:#888;font-size:13px;">共 ' + total + ' 位用戶</span> ' + pag;
    document.getElementById('auth-users-pagination').innerHTML = pag;
  } else {
    document.getElementById('auth-users-pagination').innerHTML = '<span style="color:#888;font-size:13px;">共 ' + total + ' 位用戶</span>';
  }
}

// Content views
var _postViews = [];
var _featurePosts = [];
var SHORT_LINKS = { '1': '2026-03-ai-impact-cissp-cybersecurity-future', '2': '2026-03-boris-cherny-claude-code-creator-profile', '3': '2026-03-ai-impact-toastmasters-club-operations', '4': '2026-03-ai-impact-retirees-us-canada-taiwan' };
var PUBLIC_SLUGS = ['2026-03-ai-impact-cissp-cybersecurity-future', '2026-03-boris-cherny-claude-code-creator-profile', '2026-03-ai-impact-toastmasters-club-operations', '2026-03-ai-impact-retirees-us-canada-taiwan'];

async function loadContentViews() {
  _postViews = await apiFetch('post_views', 'select=post_date,post_type,user_email&order=created_at.desc&limit=5000');
  _featurePosts = await apiFetch('posts', 'type=eq.feature&select=date,title,slug,summary&order=date.desc');
  showContentView('daily');
}

function getShortId(slug) {
  for (var k in SHORT_LINKS) { if (SHORT_LINKS[k] === slug) return k; }
  return null;
}

function showContentView(type) {
  ['daily','monthly','yearly','feature'].forEach(function(t) {
    document.getElementById('cv-btn-' + t).className = 'pag-btn' + (t === type ? ' pag-active' : '');
  });

  var filtered = _postViews.filter(function(v) { return v.post_type === type; });
  var byDate = {};
  filtered.forEach(function(v) {
    if (!byDate[v.post_date]) byDate[v.post_date] = { total: 0, unique: new Set() };
    byDate[v.post_date].total++;
    if (v.user_email) byDate[v.post_date].unique.add(v.user_email);
  });

  if (type === 'feature') {
    showFeatureView(byDate);
    return;
  }

  var sorted = Object.entries(byDate).sort(function(a, b) { return b[1].total - a[1].total; });

  var labels = { daily: '日期', monthly: '月份', yearly: '年份' };
  var fmtFn = function(d) {
    if (type === 'yearly') return d.substring(0, 4) + ' 年';
    if (type === 'monthly') { var dt = new Date(d + 'T00:00:00'); return dt.getFullYear() + '/' + (dt.getMonth()+1); }
    return d;
  };

  var html = '<table class="auth-users-table"><thead><tr>' +
    '<th>#</th><th>' + labels[type] + '</th><th>瀏覽次數</th><th>獨立用戶</th></tr></thead><tbody>';
  sorted.slice(0, 30).forEach(function(item, i) {
    html += '<tr><td>' + (i+1) + '</td><td>' + fmtFn(item[0]) + '</td><td><strong>' + item[1].total + '</strong></td><td>' + item[1].unique.size + '</td></tr>';
  });
  if (sorted.length === 0) html += '<tr><td colspan="4" style="text-align:center;color:#999;">尚無瀏覽紀錄</td></tr>';
  html += '</tbody></table>';
  document.getElementById('content-views-list').innerHTML = html;
}

function showFeatureView(byDate) {
  var html = '<table class="auth-users-table"><thead><tr>' +
    '<th>#</th><th>標題</th><th>公開</th><th>短連結</th><th>瀏覽</th><th>獨立用戶</th></tr></thead><tbody>';

  _featurePosts.forEach(function(p, i) {
    var views = byDate[p.date] || { total: 0, unique: new Set() };
    var isPublic = PUBLIC_SLUGS.indexOf(p.slug) !== -1;
    var shortId = getShortId(p.slug);
    var featureUrl = '/view-feature?slug=' + (p.slug || '');
    var shortUrl = shortId ? '/?s=' + shortId : '—';

    html += '<tr><td>' + (i+1) + '</td>' +
      '<td><a href="' + featureUrl + '" target="_blank" style="color:#2a7ae2;text-decoration:none;" title="' + (p.summary || '') + '">' + p.title + '</a>' +
      '<div style="font-size:11px;color:#999;margin-top:2px;">' + p.date + '</div></td>' +
      '<td>' + (isPublic ? '<span style="background:#22c55e;color:#fff;padding:2px 8px;border-radius:10px;font-size:11px;">公開</span>' : '<span style="background:#6b7280;color:#fff;padding:2px 8px;border-radius:10px;font-size:11px;">登入</span>') + '</td>' +
      '<td>' + (shortId ? '<a href="' + shortUrl + '" target="_blank" style="color:#2a7ae2;font-size:12px;font-family:monospace;">dailyai.tw/?s=' + shortId + '</a>' : '<span style="color:#ccc;">—</span>') + '</td>' +
      '<td><strong>' + views.total + '</strong></td>' +
      '<td>' + views.unique.size + '</td></tr>';
  });

  if (_featurePosts.length === 0) html += '<tr><td colspan="6" style="text-align:center;color:#999;">尚無專題文章</td></tr>';
  html += '</tbody></table>';
  document.getElementById('content-views-list').innerHTML = html;
}

loadDashboard().then(loadContentViews);
</script>

<style>
.stat-card { background: #f8f9fa; border: 1px solid #eee; border-radius: 8px; padding: 20px; min-width: 140px; text-align: center; }
.stat-num { font-size: 32px; font-weight: 700; color: #2a7ae2; }
.stat-label { font-size: 13px; color: #888; margin-top: 4px; }
.bar-chart { margin: 10px 0 20px; }
.bar-row { display: flex; align-items: center; margin: 4px 0; }
.bar-label { width: 100px; font-size: 13px; color: #555; text-align: right; padding-right: 10px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.bar-track { flex: 1; background: #eee; border-radius: 4px; height: 20px; }
.bar-fill { background: #2a7ae2; border-radius: 4px; height: 100%; min-width: 2px; }
.bar-count { width: 40px; font-size: 13px; color: #555; text-align: right; padding-left: 8px; }
#visits-table { width: 100%; border-collapse: collapse; font-size: 13px; }
#visits-table th { background: #f5f5f5; padding: 8px; text-align: left; border-bottom: 2px solid #ddd; }
#visits-table td { padding: 6px 8px; border-bottom: 1px solid #eee; }
#visits-table tr:hover { background: #f9f9f9; }
.contact-card { border: 1px solid #eee; border-radius: 8px; padding: 12px; margin: 10px 0; }
.contact-header { margin-bottom: 8px; }
.contact-body { color: #555; font-size: 14px; line-height: 1.6; }
.stat-clickable { cursor: pointer; transition: all 0.2s; }
.stat-clickable:hover { border-color: #2a7ae2; box-shadow: 0 2px 8px rgba(42,122,226,0.15); }
.auth-users-table { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 10px; }
.auth-users-table th { background: #f5f5f5; padding: 8px; text-align: left; border-bottom: 2px solid #ddd; }
.auth-users-table td { padding: 6px 8px; border-bottom: 1px solid #eee; }
.auth-users-table tr:hover { background: #f9f9f9; }
.pag-btn { padding: 4px 10px; margin: 0 2px; border: 1px solid #ddd; border-radius: 4px; background: #fff; cursor: pointer; font-size: 13px; }
.pag-btn:hover { background: #f0f0f0; }
.pag-active { background: #2a7ae2 !important; color: #fff !important; border-color: #2a7ae2 !important; }
@media (max-width: 600px) {
  #stats-summary { flex-direction: column; }
  .stat-card { min-width: auto; }
}
</style>
